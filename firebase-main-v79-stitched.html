<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>U.C.M.U. Chat stitched v79 stable</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#f4f7f6;font-family:Arial,Helvetica,sans-serif}
  .ucmu-frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;background:#000}
  #chatFrame{opacity:0;pointer-events:none;transition:opacity .42s ease}
  #authFrame{opacity:1;pointer-events:auto;transition:opacity .42s ease,filter .42s ease,transform .42s ease}
  body.chat-open #chatFrame{opacity:1;pointer-events:auto}
  body.chat-open #authFrame{opacity:0;pointer-events:none;filter:blur(10px);transform:scale(1.012)}
</style>
</head>
<body>
  <iframe id="authFrame" class="ucmu-frame" src="firebase-main-v63.html" title="U.C.M.U. start screen"></iframe>
  <iframe id="chatFrame" class="ucmu-frame" src="firebase-main-v42.html" title="U.C.M.U. chat"></iframe>

<script>
(() => {
  const authFrame = document.getElementById('authFrame');
  const chatFrame = document.getElementById('chatFrame');
  let opened = false;

  function safeDoc(frame){
    try { return frame.contentDocument || frame.contentWindow.document; }
    catch(e){ return null; }
  }

  function openChat(){
    if(opened) return;
    opened = true;
    document.body.classList.add('chat-open');
    unlockChatFrame();
  }

  function unlockChatFrame(){
    const doc = safeDoc(chatFrame);
    if(!doc) return;

    if(!doc.getElementById('ucmuStitchPatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuStitchPatch';
      style.textContent = `
        .login{display:none!important;opacity:0!important;pointer-events:none!important}
        body{overflow:hidden!important}
      `;
      doc.head.appendChild(style);
    }

    const login = doc.getElementById('login');
    if(login) login.classList.add('off');

    patchChatFrame();
  }

  function patchChatFrame(){
    const doc = safeDoc(chatFrame);
    if(!doc || doc.__ucmuV79Patched) return;
    doc.__ucmuV79Patched = true;
    const win = chatFrame.contentWindow;

    const style = doc.createElement('style');
    style.id = 'ucmuV79StableFixes';
    style.textContent = `
      .feed{scroll-behavior:smooth!important;overflow-anchor:none!important}
      #chatList.ucmu-stable .chat,
      #folders.ucmu-stable .chat,
      #folders.ucmu-stable [class*="folder"],
      #chatList.ucmu-stable [class*="chat"]{animation:none!important}
      #chatList .chat,#folders .chat,#folders [class*="folder"],#chatList [class*="chat"]{
        transition:transform .22s ease,top .22s ease,margin .22s ease,background .18s ease,border-color .18s ease,opacity .18s ease!important;
      }
      .msg.added,.msg.ucmu-new-glow{animation:ucmuMsgSoftIn .22s ease both, ucmuWhiteGlow 2.2s ease-out both!important}
      .msg.ucmu-new-glow .bubble{animation:ucmuBubbleGlow 2.2s ease-out both!important}
      @keyframes ucmuMsgSoftIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
      @keyframes ucmuWhiteGlow{0%{filter:drop-shadow(0 0 18px rgba(255,255,255,.72))}100%{filter:drop-shadow(0 0 0 rgba(255,255,255,0))}}
      @keyframes ucmuBubbleGlow{0%{box-shadow:0 0 0 1px rgba(255,255,255,.45),0 0 26px rgba(255,255,255,.32),0 10px 24px rgba(0,0,0,.18)}100%{box-shadow:0 0 0 1px rgba(255,255,255,0),0 0 0 rgba(255,255,255,0),0 10px 24px rgba(0,0,0,.18)}}
      .msg.ucmu-removing,.chat.ucmu-removing{pointer-events:none!important;animation:ucmuDeleteSoft .32s ease forwards!important}
      @keyframes ucmuDeleteSoft{0%{opacity:1;transform:translateX(0) scale(1);filter:blur(0)}100%{opacity:0;transform:translateX(34px) scale(.96);filter:blur(6px);max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0}}
      #folders [class*="arrow"],#folders [class*="Arrow"],#folders [class*="chevron"],#folders [class*="Chevron"],#folders .caret,#folders .toggle,#folders summary::marker{display:none!important;opacity:0!important;width:0!important;margin:0!important}
      #folders summary{list-style:none!important} #folders summary::-webkit-details-marker{display:none!important}
    `;
    doc.head.appendChild(style);

    win.setTimeout(() => {
      doc.getElementById('chatList')?.classList.add('ucmu-stable');
      doc.getElementById('folders')?.classList.add('ucmu-stable');
    }, 900);

    patchSafeSending(doc, win);
    patchSmoothFeed(doc, win);
    patchNewMessageGlow(doc, win);
    patchDeleteHint(doc, win);
  }

  function activeChatKey(doc){
    const active = doc.querySelector('.chat.active,[data-chat].active,.folderChat.active,.folder-chat.active');
    const raw = active?.dataset?.chat || active?.dataset?.id || active?.textContent || 'default-chat';
    return String(raw).trim().replace(/\s+/g,' ').slice(0,80) || 'default-chat';
  }

  function patchSafeSending(doc, win){
    const input = doc.getElementById('input') || doc.querySelector('.msginput, textarea, .compose input');
    const send = doc.getElementById('send') || doc.querySelector('.send');
    const feed = doc.getElementById('feed');
    if(!input || !send || !feed) return;
    let lock = false;

    function scrollBottom(){
      const last = feed.querySelector('.msg:last-of-type');
      if(last?.scrollIntoView) last.scrollIntoView({behavior:'smooth', block:'end', inline:'nearest'});
      else feed.scrollTo({top:feed.scrollHeight, behavior:'smooth'});
    }

    function safeSend(ev){
      if(ev){ ev.preventDefault(); ev.stopPropagation(); ev.stopImmediatePropagation(); }
      if(lock) return;
      const text = (input.value || '').trim();
      if(!text) return;
      lock = true;
      activeChatKey(doc);
      const stamp = Date.now().toString(36);
      feed.insertAdjacentHTML('beforeend', `
        <article class="msg added ucmu-new-glow" data-ucmu-safe-msg="${stamp}">
          <div class="ava s"></div>
          <div class="bubble">
            <div class="meta"><span class="red">Director</span><span class="time">сейчас</span></div>
            <div class="txt"></div>
          </div>
        </article>`);
      const msg = feed.querySelector(`[data-ucmu-safe-msg="${stamp}"] .txt`);
      if(msg) msg.textContent = text;
      input.value = '';
      input.dispatchEvent(new win.Event('input', {bubbles:true}));
      scrollBottom();
      win.setTimeout(() => { lock = false; }, 90);
    }

    send.addEventListener('click', safeSend, true);
    input.addEventListener('keydown', ev => {
      if(ev.key === 'Enter' && !ev.shiftKey) safeSend(ev);
    }, true);
  }

  function patchSmoothFeed(doc, win){
    const feed = doc.getElementById('feed');
    if(!feed) return;
    let scrollTimer = 0;
    new win.MutationObserver(muts => {
      if(!muts.some(m => Array.from(m.addedNodes).some(n => n.nodeType === 1 && (n.classList?.contains('msg') || n.querySelector?.('.msg'))))) return;
      win.clearTimeout(scrollTimer);
      scrollTimer = win.setTimeout(() => {
        const last = feed.querySelector('.msg:last-of-type');
        if(last?.scrollIntoView) last.scrollIntoView({behavior:'smooth', block:'end', inline:'nearest'});
        else feed.scrollTo({top:feed.scrollHeight, behavior:'smooth'});
      }, 32);
    }).observe(feed, {childList:true, subtree:false});
  }

  function patchNewMessageGlow(doc, win){
    const feed = doc.getElementById('feed');
    if(!feed) return;
    new win.MutationObserver(muts => {
      muts.forEach(m => Array.from(m.addedNodes).forEach(n => {
        if(n.nodeType !== 1) return;
        const items = n.classList?.contains('msg') ? [n] : Array.from(n.querySelectorAll?.('.msg') || []);
        items.forEach(el => {
          el.classList.add('ucmu-new-glow');
          win.setTimeout(() => el.classList.remove('ucmu-new-glow'), 2400);
        });
      }));
    }).observe(feed, {childList:true, subtree:false});
  }

  function patchDeleteHint(doc, win){
    doc.addEventListener('click', ev => {
      const btn = ev.target.closest?.('[data-a="delete"],.dangerPrimary,#confirmDelete,.chatAction.danger,.selectedAction.danger');
      if(!btn) return;
      const target = doc.querySelector('.msg:hover,.msg.selected,.msg.active') || doc.querySelector('.chat:hover,.chat.active') || btn.closest('.msg,.chat');
      if(target) target.classList.add('ucmu-removing');
    }, true);
  }

  function patchAuthFrame(){
    const doc = safeDoc(authFrame);
    if(!doc) return;
    if(!doc.getElementById('ucmuAuthOnlyPatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuAuthOnlyPatch';
      style.textContent = `
        .app,.modal{display:none!important;opacity:0!important;pointer-events:none!important}
        .auth{display:grid!important}
        html,body{overflow:hidden!important;background:#000!important}
      `;
      doc.head.appendChild(style);
    }
    Array.from(doc.querySelectorAll('button')).forEach(btn => {
      const text = (btn.textContent || '').trim().toUpperCase();
      if(text.includes('ВОЙТИ')) btn.addEventListener('click', () => setTimeout(openChat, 260), {once:false});
    });
    const observer = new MutationObserver(() => {
      const auth = doc.querySelector('.auth');
      const app = doc.querySelector('.app');
      if((auth && auth.classList.contains('hidden')) || (app && app.classList.contains('active'))) openChat();
    });
    observer.observe(doc.documentElement, {attributes:true, subtree:true, attributeFilter:['class']});
  }

  authFrame.addEventListener('load', patchAuthFrame);
  chatFrame.addEventListener('load', unlockChatFrame);
  setTimeout(patchAuthFrame, 500);
  setTimeout(unlockChatFrame, 500);
})();
</script>
</body>
</html>
