<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>U.C.M.U. Chat stitched v98 left panel anim</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}
  iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#000}
</style>
</head>
<body>
<iframe id="shell" src="firebase-main-v97-stitched.html" title="U.C.M.U. Chat v98"></iframe>
<script>
(() => {
  const shell = document.getElementById('shell');

  function safeDoc(frame){
    try { return frame.contentDocument || frame.contentWindow.document; }
    catch(e){ return null; }
  }

  function findChatFrame(rootDoc, depth = 0){
    if(!rootDoc || depth > 8) return null;
    const direct = rootDoc.getElementById('chatFrame');
    if(direct) return direct;
    for(const frame of Array.from(rootDoc.querySelectorAll('iframe'))){
      const found = findChatFrame(safeDoc(frame), depth + 1);
      if(found) return found;
    }
    return null;
  }

  function patch(){
    const root = safeDoc(shell);
    const chatFrame = findChatFrame(root);
    const doc = chatFrame ? safeDoc(chatFrame) : null;
    const win = chatFrame?.contentWindow;
    if(!doc || !win || doc.__ucmuV98Patched) return;
    doc.__ucmuV98Patched = true;

    const style = doc.createElement('style');
    style.id = 'ucmuV98LeftPanelAnim';
    style.textContent = `
      /* сообщения не трогаем — их текущая анимация зафиксирована */

      /* левая панель: тот же паттерн появления */
      .ucmu-left-enter{
        animation:ucmuV98LeftEnter .9s cubic-bezier(.16,.86,.22,1) both!important;
        will-change:opacity,filter,transform!important;
      }
      @keyframes ucmuV98LeftEnter{
        0%{opacity:0;filter:blur(12px);transform:translateY(18px) scale(.965)}
        100%{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}
      }

      /* левая панель: таймер удаления — тот же blur/opacity */
      .ucmu-left-pending{
        animation:ucmuV98LeftPending 5s linear forwards!important;
        pointer-events:none!important;
        will-change:opacity,filter!important;
      }
      @keyframes ucmuV98LeftPending{
        0%{opacity:1;filter:blur(0)}
        100%{opacity:.6;filter:blur(2.5px)}
      }

      .ucmu-left-restored{
        animation:ucmuV98LeftRestore .22s ease-out both!important;
      }
      @keyframes ucmuV98LeftRestore{
        from{opacity:.6;filter:blur(2.5px)}
        to{opacity:1;filter:blur(0)}
      }

      .ucmu-left-remove{
        pointer-events:none!important;
        overflow:hidden!important;
        animation:ucmuV98LeftRemove .9s cubic-bezier(.16,.86,.22,1) forwards!important;
        will-change:opacity,filter,transform,max-height!important;
      }
      @keyframes ucmuV98LeftRemove{
        0%{opacity:.6;filter:blur(2.5px);transform:translateY(0) scale(1);max-height:190px}
        100%{opacity:0;filter:blur(12px);transform:translateY(18px) scale(.965);max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0}
      }
    `;
    doc.head.appendChild(style);

    function leftRoots(){
      return [
        doc.getElementById('chatList'),
        doc.getElementById('folders'),
        doc.querySelector('.sidebar'),
        doc.querySelector('.left'),
        doc.querySelector('.leftPanel'),
        doc.querySelector('.rail')
      ].filter(Boolean);
    }

    function isLeftItem(el){
      if(!el || el.nodeType !== 1 || !el.matches) return false;
      if(el.closest?.('.login,#ctx,#chatCtx,#folderCtx,#deleteModal,#selectedCtx,.ucmuUndoToast')) return false;
      const roots = leftRoots();
      if(!roots.some(root => root.contains(el))) return false;

      return el.matches([
        '.chat',
        '[data-chat]',
        '[data-chat-id]',
        '[data-id]',
        '[data-folder-id]',
        '.folder',
        '.folderItem',
        '.folder-item',
        '.folderRow',
        '.folder-row',
        '.folderCard',
        '.folder-card',
        '.item',
        '.row',
        '.tile',
        '.card'
      ].join(','));
    }

    function collectLeftItems(node){
      const out = [];
      if(!node || node.nodeType !== 1) return out;
      if(isLeftItem(node)) out.push(node);
      node.querySelectorAll?.('.chat,[data-chat],[data-chat-id],[data-id],[data-folder-id],.folder,.folderItem,.folder-item,.folderRow,.folder-row,.folderCard,.folder-card,.item,.row,.tile,.card').forEach(el => {
        if(isLeftItem(el)) out.push(el);
      });
      return out;
    }

    let observeAdds = false;
    win.setTimeout(() => { observeAdds = true; }, 1100);

    leftRoots().forEach(rootNode => {
      new win.MutationObserver(muts => {
        if(!observeAdds) return;
        muts.forEach(m => {
          m.addedNodes.forEach(n => {
            collectLeftItems(n).forEach(el => {
              if(el.__ucmuLeftSeen || el.__ucmuRemoving) return;
              el.__ucmuLeftSeen = true;
              el.classList.remove('ucmu-left-enter');
              void el.offsetWidth;
              el.classList.add('ucmu-left-enter');
              win.setTimeout(() => el.classList.remove('ucmu-left-enter'), 950);
            });
          });
        });
      }).observe(rootNode, {childList:true, subtree:true});
    });

    let lastLeftItem = null;

    function remember(ev){
      const candidate = ev.target.closest?.('.chat,[data-chat],[data-chat-id],[data-id],[data-folder-id],.folder,.folderItem,.folder-item,.folderRow,.folder-row,.folderCard,.folder-card,.item,.row,.tile,.card');
      if(candidate && isLeftItem(candidate)) lastLeftItem = candidate;
    }

    doc.addEventListener('contextmenu', remember, true);
    doc.addEventListener('pointerdown', remember, true);

    function targetFromButton(btn){
      const isLeftDelete = btn.closest?.('#chatCtx,#folderCtx') || btn.classList?.contains('chatAction') || btn.classList?.contains('folderAction');
      if(!isLeftDelete) return null;
      return lastLeftItem || doc.querySelector('.chat:hover,[data-chat]:hover,[data-chat-id]:hover,[data-folder-id]:hover,#folders .folder:hover,#folders .folderItem:hover,#folders .folder-item:hover');
    }

    // На старт удаления в левой панели — pending.
    doc.addEventListener('click', ev => {
      const btn = ev.target.closest?.('.chatAction.danger,.folderAction.danger,#chatCtx [data-a="delete"],#folderCtx [data-a="delete"]');
      if(!btn) return;
      const item = targetFromButton(btn);
      if(!item) return;
      item.classList.remove('ucmu-left-restored');
      item.classList.add('ucmu-left-pending');
    }, true);

    // Вернуть — снимаем pending.
    doc.addEventListener('click', ev => {
      const undo = ev.target.closest?.('.ucmuUndoBtn,#undoDelete,.undoToast button');
      if(!undo) return;
      doc.querySelectorAll('.ucmu-left-pending').forEach(el => {
        el.classList.remove('ucmu-left-pending');
        el.classList.add('ucmu-left-restored');
        win.setTimeout(() => el.classList.remove('ucmu-left-restored'), 260);
      });
    }, true);

    // Если старая логика всё же ставит общий класс удаления — дублируем на левый класс.
    new win.MutationObserver(muts => {
      muts.forEach(m => {
        if(m.type !== 'attributes') return;
        const el = m.target;
        if(!isLeftItem(el)) return;
        if(el.classList.contains('ucmu-anim-remove') && !el.classList.contains('ucmu-left-remove')){
          el.classList.add('ucmu-left-remove');
        }
        if(el.classList.contains('ucmu-delete-pending') && !el.classList.contains('ucmu-left-pending')){
          el.classList.add('ucmu-left-pending');
        }
      });
    }).observe(doc.body, {subtree:true, attributes:true, attributeFilter:['class']});

    // Оборачиваем remove только для левой панели — сообщения не трогаем.
    const nativeRemove = win.Element.prototype.remove;
    if(!win.Element.prototype.__ucmuV98LeftRemovePatched){
      win.Element.prototype.__ucmuV98LeftRemovePatched = true;
      win.Element.prototype.remove = function(){
        const el = this;
        if(isLeftItem(el) && !el.__ucmuNativeRemoving && !el.__ucmuRemoving){
          el.__ucmuRemoving = true;
          el.classList.remove('ucmu-left-pending');
          el.classList.add('ucmu-left-remove');
          win.setTimeout(() => {
            el.__ucmuNativeRemoving = true;
            nativeRemove.call(el);
          }, 930);
          return;
        }
        return nativeRemove.call(el);
      };
    }
  }

  shell.addEventListener('load', () => {
    const timer = setInterval(() => {
      patch();
      const root = safeDoc(shell);
      const chat = findChatFrame(root);
      const doc = chat ? safeDoc(chat) : null;
      if(doc?.__ucmuV98Patched) clearInterval(timer);
    }, 300);
    setTimeout(() => clearInterval(timer), 12000);
  });
})();
</script>
</body>
</html>
