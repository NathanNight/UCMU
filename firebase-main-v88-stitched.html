<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>U.C.M.U. Chat stitched v88 smooth messages</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#f4f7f6;font-family:Arial,Helvetica,sans-serif}
  .ucmu-frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;background:#000}
  #chatFrame{opacity:0;pointer-events:none;transition:opacity .42s ease}
  #authFrame{opacity:1;pointer-events:auto;transition:opacity .42s ease,filter .42s ease,transform .42s ease}
  body.chat-open #chatFrame{opacity:1;pointer-events:auto}
  body.chat-open #authFrame{opacity:0;pointer-events:none;filter:blur(10px);transform:scale(1.012)}
</style>
</head>
<body>
  <iframe id="authFrame" class="ucmu-frame" src="firebase-main-v63.html" title="U.C.M.U. start screen"></iframe>
  <iframe id="chatFrame" class="ucmu-frame" src="firebase-main-v42.html?v=88" title="U.C.M.U. chat"></iframe>
<script>
(() => {
  const authFrame = document.getElementById('authFrame');
  const chatFrame = document.getElementById('chatFrame');
  let opened = false;

  function safeDoc(frame){
    try { return frame.contentDocument || frame.contentWindow.document; }
    catch(e){ return null; }
  }

  function openChat(){
    if(opened) return;
    opened = true;
    document.body.classList.add('chat-open');
    patchChatFrame();
  }

  function patchChatFrame(){
    const doc = safeDoc(chatFrame);
    if(!doc) return;

    if(!doc.getElementById('ucmuV88BasePatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuV88BasePatch';
      style.textContent = `
        .login{display:none!important;opacity:0!important;pointer-events:none!important}
        body{overflow:hidden!important}
        .feed{scroll-behavior:smooth!important;overflow-anchor:none!important}
        #chatList.ucmu-stable .chat,
        #folders.ucmu-stable .chat,
        #folders.ucmu-stable [class*="folder"],
        #chatList.ucmu-stable [class*="chat"]{animation:none!important}
        .msg.ucmu-msg-in{
          animation:ucmuMsgIn .34s cubic-bezier(.18,1.1,.28,1) both!important;
        }
        .msg.ucmu-msg-in .bubble{
          animation:ucmuMsgGlow .9s ease-out both!important;
        }
        @keyframes ucmuMsgIn{
          0%{opacity:0;filter:blur(7px);transform:translateY(10px) scale(.985)}
          70%{opacity:1;filter:blur(0);transform:translateY(-1px) scale(1.002)}
          100%{opacity:1;filter:blur(0);transform:none}
        }
        @keyframes ucmuMsgGlow{
          0%{box-shadow:0 0 0 1px rgba(255,255,255,.18),0 0 9px rgba(255,255,255,.12),0 10px 24px rgba(0,0,0,.18)}
          100%{box-shadow:0 0 0 1px rgba(255,255,255,0),0 0 0 rgba(255,255,255,0),0 10px 24px rgba(0,0,0,.18)}
        }
        .msg.ucmu-delete-smooth,
        .chat.ucmu-delete-smooth{
          pointer-events:none!important;
          overflow:hidden!important;
          animation:ucmuDeleteSmooth .46s cubic-bezier(.22,.9,.24,1) forwards!important;
        }
        @keyframes ucmuDeleteSmooth{
          0%{opacity:1;filter:blur(0);transform:translateY(0) scale(1);max-height:170px;margin-bottom:18px}
          45%{opacity:.72;filter:blur(1px);transform:translateY(8px) scale(.985);max-height:170px;margin-bottom:18px}
          100%{opacity:0;filter:blur(7px);transform:translateY(22px) scale(.94);max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0}
        }
      `;
      doc.head.appendChild(style);
    }

    doc.getElementById('login')?.classList.add('off');
    patchSmoothSend(doc, chatFrame.contentWindow);
    patchSmoothDelete(doc, chatFrame.contentWindow);

    chatFrame.contentWindow.setTimeout(() => {
      doc.getElementById('chatList')?.classList.add('ucmu-stable');
      doc.getElementById('folders')?.classList.add('ucmu-stable');
    }, 700);
  }

  function patchSmoothSend(doc, win){
    if(doc.__ucmuV88SendPatched) return;
    doc.__ucmuV88SendPatched = true;

    const input = doc.getElementById('input') || doc.querySelector('.msginput, textarea, .compose input');
    const send = doc.getElementById('send') || doc.querySelector('.send');
    const feed = doc.getElementById('feed');
    if(!input || !send || !feed) return;

    let lock = false;

    function scrollBottom(){
      const last = feed.querySelector('.msg:last-of-type');
      if(last && last.scrollIntoView){
        last.scrollIntoView({behavior:'smooth', block:'end', inline:'nearest'});
      }else{
        feed.scrollTo({top:feed.scrollHeight, behavior:'smooth'});
      }
    }

    function addOneMessage(text){
      const stamp = Date.now().toString(36);
      feed.insertAdjacentHTML('beforeend', `
        <article class="msg ucmu-msg-in" data-ucmu-v88-msg="${stamp}">
          <div class="ava s"></div>
          <div class="bubble">
            <div class="meta"><span class="red">Director</span><span class="time">сейчас</span></div>
            <div class="txt"></div>
          </div>
        </article>`);
      const node = feed.querySelector(`[data-ucmu-v88-msg="${stamp}"] .txt`);
      if(node) node.textContent = text;
      scrollBottom();
    }

    function safeSend(ev){
      if(ev){
        ev.preventDefault();
        ev.stopPropagation();
        ev.stopImmediatePropagation();
      }
      if(lock) return;
      const text = (input.value || '').trim();
      if(!text) return;
      lock = true;
      addOneMessage(text);
      input.value = '';
      input.dispatchEvent(new win.Event('input', {bubbles:true}));
      win.setTimeout(() => { lock = false; }, 120);
    }

    send.addEventListener('click', safeSend, true);
    input.addEventListener('keydown', ev => {
      if(ev.key === 'Enter' && !ev.shiftKey) safeSend(ev);
    }, true);
  }

  function patchSmoothDelete(doc, win){
    if(doc.__ucmuV88DeletePatched) return;
    doc.__ucmuV88DeletePatched = true;

    let lastTarget = null;

    function remember(ev){
      const msg = ev.target.closest?.('.msg');
      const chat = ev.target.closest?.('.chat');
      if(msg) lastTarget = msg;
      if(chat) lastTarget = chat;
    }

    doc.addEventListener('contextmenu', remember, true);
    doc.addEventListener('pointerdown', remember, true);

    doc.addEventListener('click', ev => {
      const btn = ev.target.closest?.('[data-a="delete"],.dangerPrimary,#confirmDelete,.chatAction.danger,.selectedAction.danger');
      if(!btn) return;

      const target = lastTarget || doc.querySelector('.msg:hover,.msg.selected,.msg.active,.chat:hover,.chat.active');
      if(!target || target.classList.contains('ucmu-delete-smooth')) return;

      // Не ломаем саму логику удаления: только заранее запускаем визуал.
      target.classList.add('ucmu-delete-smooth');
    }, true);
  }

  function patchAuthFrame(){
    const doc = safeDoc(authFrame);
    if(!doc) return;

    if(!doc.getElementById('ucmuAuthOnlyPatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuAuthOnlyPatch';
      style.textContent = `
        .app,.modal{display:none!important;opacity:0!important;pointer-events:none!important}
        .auth{display:grid!important}
        html,body{overflow:hidden!important;background:#000!important}
      `;
      doc.head.appendChild(style);
    }

    Array.from(doc.querySelectorAll('button')).forEach(btn => {
      const text = (btn.textContent || '').trim().toUpperCase();
      if(text.includes('ВОЙТИ')){
        btn.addEventListener('click', () => setTimeout(openChat, 260), { once:false });
      }
    });

    const observer = new MutationObserver(() => {
      const auth = doc.querySelector('.auth');
      const app = doc.querySelector('.app');
      if((auth && auth.classList.contains('hidden')) || (app && app.classList.contains('active'))){
        openChat();
      }
    });
    observer.observe(doc.documentElement, { attributes:true, subtree:true, attributeFilter:['class'] });
  }

  authFrame.addEventListener('load', patchAuthFrame);
  chatFrame.addEventListener('load', patchChatFrame);
  setTimeout(patchAuthFrame, 500);
  setTimeout(patchChatFrame, 500);
})();
</script>
</body>
</html>
