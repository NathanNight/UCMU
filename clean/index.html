<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#020303">
  <title>U.C.M.U Chat Clean</title>
  <link rel="stylesheet" href="./styles.css?v=stable">
  <link rel="stylesheet" href="./intro.css?v=stable">
  <link rel="stylesheet" href="./desktop-intro.css?v=stable">
</head>
<body>
  <div id="desktopBoot" class="desktop-boot-overlay" aria-hidden="true">
    <div class="desktop-boot-word">INITIALIZATION</div>
  </div>
  <div id="app"></div>

  <script>
    const isDesktop = !!(window.ucmuDesktop || (window.process && window.process.type === 'renderer'));
    if (isDesktop) document.body.classList.add('ucmu-desktop');
    else document.getElementById('desktopBoot')?.remove();

    const load = (src) => {
      const s = document.createElement('script');
      s.type = 'module';
      s.src = src;
      document.body.appendChild(s);
    };

    load('./app.js?v=stable');

    if (!isDesktop) {
      load('./keyboard.js');
      load('./drag.js');
      load('./composer-fix.js');
      load('./capacitor-mobile.js');
    }

    if (isDesktop) {
      window.setTimeout(() => document.body.classList.add('desktop-boot-done'), 1450);
      window.setTimeout(() => document.getElementById('desktopBoot')?.remove(), 1750);
    }
  </script>
</body>
</html>
