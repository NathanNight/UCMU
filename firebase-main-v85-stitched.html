<style>

<script>
(()=>{
const authFrame=document.getElementById('authFrame');
const chatFrame=document.getElementById('chatFrame');
let opened=false;
function safeDoc(f){try{return f.contentDocument||f.contentWindow.document}catch(e){return null}}
function openChat(){if(opened)return;opened=true;document.body.classList.add('chat-open');patchChat()}
function patchAuth(){const d=safeDoc(authFrame);if(!d)return;if(!d.getElementById('ucmuAuthOnlyPatch')){const s=d.createElement('style');s.id='ucmuAuthOnlyPatch';s.textContent='.app,.modal{display:none!important;opacity:0!important;pointer-events:none!important}.auth{display:grid!important}html,body{overflow:hidden!important;background:#000!important}';d.head.appendChild(s)}Array.from(d.querySelectorAll('button')).forEach(b=>{if((b.textContent||'').trim().toUpperCase().includes('ВОЙТИ'))b.addEventListener('click',()=>setTimeout(openChat,260),{once:false})});new MutationObserver(()=>{const a=d.querySelector('.auth'),app=d.querySelector('.app');if((a&&a.classList.contains('hidden'))||(app&&app.classList.contains('active')))openChat()}).observe(d.documentElement,{attributes:true,subtree:true,attributeFilter:['class']})}
function patchChat(){const d=safeDoc(chatFrame);if(!d)return;if(!d.getElementById('ucmuLoginHide')){const s=d.createElement('style');s.id='ucmuLoginHide';s.textContent='.login{display:none!important;opacity:0!important;pointer-events:none!important}body{overflow:hidden!important}';d.head.appendChild(s)}d.getElementById('login')?.classList.add('off');if(d.__ucmuV85Patched)return;d.__ucmuV85Patched=true;const w=chatFrame.contentWindow;
const s=d.createElement('style');s.id='ucmuV85Patch';s.textContent=`
.feed{scroll-behavior:smooth!important;overflow-anchor:none!important}
#chatList.ucmu-stable .chat,#folders.ucmu-stable .chat,#folders.ucmu-stable [class*="folder"],#chatList.ucmu-stable [class*="chat"]{animation:none!important}
#chatList .chat,#folders .chat,#folders [class*="folder"],#chatList [class*="chat"]{transition:transform .22s ease,top .22s ease,margin .22s ease,background .18s ease,border-color .18s ease,opacity .18s ease!important}
.msg.added,.msg.ucmu-new-glow{animation:ucmuV85MsgIn .42s cubic-bezier(.18,1.1,.28,1) both,ucmuV85Glow 1.5s ease-out both!important}.msg.added .bubble,.msg.ucmu-new-glow .bubble{animation:ucmuV85BubbleGlow 1.5s ease-out both!important}
@keyframes ucmuV85MsgIn{0%{opacity:0;filter:blur(9px);transform:translateY(10px) scale(.985)}70%{opacity:1;filter:blur(0);transform:translateY(-1px) scale(1.002)}100%{opacity:1;filter:blur(0);transform:none}}
@keyframes ucmuV85Glow{0%{filter:drop-shadow(0 0 7px rgba(255,255,255,.32))}100%{filter:drop-shadow(0 0 0 rgba(255,255,255,0))}}
@keyframes ucmuV85BubbleGlow{0%{box-shadow:0 0 0 1px rgba(255,255,255,.20),0 0 10px rgba(255,255,255,.14),0 10px 24px rgba(0,0,0,.18)}100%{box-shadow:0 0 0 1px rgba(255,255,255,0),0 0 0 rgba(255,255,255,0),0 10px 24px rgba(0,0,0,.18)}}
.ucmu-delete-pending{opacity:.34!important;filter:grayscale(.15)!important;pointer-events:none!important;transition:opacity .22s ease,filter .22s ease!important}
.ucmu-delete-final{pointer-events:none!important;overflow:hidden!important;animation:ucmuV85Delete .46s cubic-bezier(.22,.9,.24,1) forwards!important;transform-origin:center!important}
@keyframes ucmuV85Delete{0%{opacity:.34;filter:blur(0);transform:translateY(0) translateX(0) scale(1);max-height:170px}45%{opacity:.72;filter:blur(1.5px);transform:translateY(-2px) translateX(12px) scale(.985);max-height:170px}100%{opacity:0;filter:blur(8px);transform:translateY(-7px) translateX(38px) scale(.94);max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0}}
.ucmuUndoToast{position:fixed;left:50%;bottom:18px;z-index:999999;transform:translateX(-50%);min-width:270px;max-width:calc(100vw - 28px);padding:12px 14px 10px;background:rgba(12,16,16,.97);border:1px solid rgba(255,255,255,.15);box-shadow:0 18px 45px rgba(0,0,0,.52),0 0 18px rgba(255,255,255,.06);color:#f4f7f6;font:13px Segoe UI,Arial,sans-serif;backdrop-filter:blur(16px)}.ucmuUndoRow{display:flex;align-items:center;gap:14px;justify-content:space-between}.ucmuUndoText{color:rgba(244,247,246,.86)}.ucmuUndoBtn{height:30px;padding:0 12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;font-weight:900;cursor:pointer}.ucmuUndoBar{height:2px;background:rgba(255,255,255,.12);margin-top:10px;overflow:hidden}.ucmuUndoBar:before{content:"";display:block;height:100%;background:rgba(255,255,255,.62);animation:ucmuUndoBar 5s linear forwards}@keyframes ucmuUndoBar{from{width:100%}to{width:0}}
#folders [class*="arrow"],#folders [class*="Arrow"],#folders [class*="chevron"],#folders [class*="Chevron"],#folders .caret,#folders .toggle,#folders summary::marker{display:none!important;opacity:0!important;width:0!important;margin:0!important}#folders summary{list-style:none!important}#folders summary::-webkit-details-marker{display:none!important}
body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="content"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="Content"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="body"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="Body"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="list"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="List"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="chats"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="Chats"]{display:none!important;max-height:0!important;opacity:0!important;pointer-events:none!important}
`;d.head.appendChild(s);
w.setTimeout(()=>{d.getElementById('chatList')?.classList.add('ucmu-stable');d.getElementById('folders')?.classList.add('ucmu-stable')},900);
patchSafeSending(d,w);patchGlow(d,w);patchUnifiedDelete(d,w);patchFolders(d,w);patchEdges(d,w);patchScroll(d,w)}
function patchSafeSending(d,w){const input=d.getElementById('input')||d.querySelector('.msginput,textarea,.compose input'),send=d.getElementById('send')||d.querySelector('.send'),feed=d.getElementById('feed');if(!input||!send||!feed)return;let lock=false;function scroll(){const last=feed.querySelector('.msg:last-of-type');last?.scrollIntoView?last.scrollIntoView({behavior:'smooth',block:'end',inline:'nearest'}):feed.scrollTo({top:feed.scrollHeight,behavior:'smooth'})}function safeSend(ev){if(ev){ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation()}if(lock)return;const text=(input.value||'').trim();if(!text)return;lock=true;const stamp=Date.now().toString(36);feed.insertAdjacentHTML('beforeend',`<article class="msg added ucmu-new-glow" data-ucmu-safe-msg="${stamp}"><div class="ava s"></div><div class="bubble"><div class="meta"><span class="red">Director</span><span class="time">сейчас</span></div><div class="txt"></div></div></article>`);const msg=feed.querySelector(`[data-ucmu-safe-msg="${stamp}"] .txt`);if(msg)msg.textContent=text;input.value='';input.dispatchEvent(new w.Event('input',{bubbles:true}));scroll();w.setTimeout(()=>lock=false,90)}send.addEventListener('click',safeSend,true);input.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&!ev.shiftKey)safeSend(ev)},true)}
function patchGlow(d,w){const feed=d.getElementById('feed');if(!feed)return;new w.MutationObserver(muts=>{muts.forEach(m=>Array.from(m.addedNodes).forEach(n=>{if(n.nodeType!==1)return;const items=n.classList?.contains('msg')?[n]:Array.from(n.querySelectorAll?.('.msg')||[]);items.forEach(el=>{el.classList.add('ucmu-new-glow');w.setTimeout(()=>el.classList.remove('ucmu-new-glow'),1600)})}))}).observe(feed,{childList:true,subtree:false})}
function patchScroll(d,w){const feed=d.getElementById('feed');if(!feed)return;let t=0;new w.MutationObserver(muts=>{if(!muts.some(m=>Array.from(m.addedNodes).some(n=>n.nodeType===1&&(n.classList?.contains('msg')||n.querySelector?.('.msg')))))return;w.clearTimeout(t);t=w.setTimeout(()=>{const last=feed.querySelector('.msg:last-of-type');last?.scrollIntoView?last.scrollIntoView({behavior:'smooth',block:'end',inline:'nearest'}):feed.scrollTo({top:feed.scrollHeight,behavior:'smooth'})},32)}).observe(feed,{childList:true,subtree:false})}
function patchUnifiedDelete(d,w){let lastMsg=null,lastChat=null,lastFolder=null;let job=null;function closestFolder(el){const root=d.getElementById('folders');const f=el?.closest?.('[data-folder-id],.folderItem,.folder-item,.folderRow,.folder-row,.folderCard,.folder-card,.folder,details');return f&&root?.contains(f)&&f.id!=='folderBtn'&&!f.closest('#folderModal,#folderStyleModal,#folderCtx')?f:null}function remember(ev){const m=ev.target.closest?.('.msg');if(m)lastMsg=m;const c=ev.target.closest?.('.chat');if(c)lastChat=c;const f=closestFolder(ev.target);if(f)lastFolder=f}d.addEventListener('contextmenu',remember,true);d.addEventListener('pointerdown',remember,true);
function cancelJob(){if(job?.timer)clearTimeout(job.timer);if(job?.toast)job.toast.remove();if(job?.target){job.target.classList.remove('ucmu-delete-pending','ucmu-delete-final');job.target.style.opacity='';job.target.style.filter='';job.target.style.pointerEvents=''}job=null}
function startDelete(target,text){if(!target)return;cancelJob();target.classList.add('ucmu-delete-pending');const toast=d.createElement('div');toast.className='ucmuUndoToast';toast.innerHTML=`<div class="ucmuUndoRow"><div class="ucmuUndoText">${text}</div><button class="ucmuUndoBtn">ВЕРНУТЬ</button></div><div class="ucmuUndoBar"></div>`;d.body.appendChild(toast);job={target,toast,timer:null};toast.querySelector('button').onclick=()=>cancelJob();job.timer=w.setTimeout(()=>{toast.remove();target.classList.remove('ucmu-delete-pending');target.classList.add('ucmu-delete-final');w.setTimeout(()=>{target.remove();if(job?.target===target)job=null},470)},5000)}
function hideMenus(){['ctx','chatCtx','folderCtx','deleteModal','selectedCtx'].forEach(id=>d.getElementById(id)?.classList.add('hidden'))}
d.addEventListener('click',ev=>{const btn=ev.target.closest?.('[data-a="delete"],.dangerPrimary,#confirmDelete,.chatAction.danger,.folderAction.danger,.selectedAction.danger');if(!btn)return;const inFolder=!!btn.closest('#folderCtx')||btn.classList?.contains('folderAction');const inChat=!!btn.closest('#chatCtx')||btn.classList?.contains('chatAction');const inMsg=!!btn.closest('#ctx')||btn.id==='confirmDelete'||btn.closest('#deleteModal');let target=null,text='Удалено';if(inFolder){target=lastFolder||closestFolder(btn)||d.querySelector('#folders [data-folder-id],#folders .folderItem,#folders .folder-item,#folders .folder');text='Папка удалена'}else if(inChat){target=lastChat||d.querySelector('.chat:hover')||d.querySelector('.chat.active');text='Чат удалён'}else if(inMsg){target=lastMsg||d.querySelector('.msg:hover,.msg.selected,.msg.active');text='Сообщение удалено для вас'}else return;ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();hideMenus();startDelete(target,text)},true)}
function patchFolders(d,w){const root=d.getElementById('folders');if(!root)return;const sel='[data-folder-id],.folderItem,.folder-item,.folderRow,.folder-row,.folderCard,.folder-card,.folder,details';let dragging=false;function folders(){return Array.from(root.querySelectorAll(sel)).filter(f=>f.id!=='folderBtn'&&!f.closest('#folderModal,#folderStyleModal,#folderCtx'))}function isChat(el){return!!el?.closest?.('.chat,[data-chat],.folderChat,.folder-chat')}function contents(f){const arr=Array.from(f.querySelectorAll('[class*="content"],[class*="Content"],[class*="body"],[class*="Body"],[class*="list"],[class*="List"],[class*="chats"],[class*="Chats"]'));const n=f.nextElementSibling;if(n&&root.contains(n)&&/folder|chat|list|body|content/i.test(n.className||''))arr.push(n);return arr}function isOpen(f){if(!f)return false;if(f.open===true)return true;if(f.getAttribute('aria-expanded')==='true')return true;if(f.dataset?.open==='true'||f.dataset?.expanded==='true')return true;if(/\b(open|opened|expanded|is-open|folderOpen|folder-open|show|shown)\b/i.test(String(f.className||'')))return true;return contents(f).some(c=>!c.classList.contains('hidden')&&c.offsetHeight>6&&getComputedStyle(c).display!=='none')}function close(f){if(!f)return;f.open=false;f.setAttribute('aria-expanded','false');f.dataset.open='false';f.dataset.expanded='false';f.className=String(f.className||'').replace(/\b(open|opened|expanded|is-open|folderOpen|folder-open|show|shown)\b/gi,'');contents(f).forEach(c=>{c.classList.add('hidden');c.style.display='none';c.style.maxHeight='0px';c.style.opacity='0';c.style.pointerEvents='none'})}function enforce(){folders().forEach(f=>{if(dragging&&f.dataset.ucmuWasOpen==='0')close(f);else if(!dragging&&f.dataset.ucmuUserOpen!=='1')close(f)})}function snap(){folders().forEach(f=>{if(!f.dataset.ucmuUserOpen)f.dataset.ucmuUserOpen='0';f.dataset.ucmuWasOpen=(f.dataset.ucmuUserOpen==='1'&&isOpen(f))?'1':'0';if(f.dataset.ucmuUserOpen!=='1')close(f)})}function start(ev){if(!isChat(ev.target))return;dragging=true;d.body.classList.add('ucmu-folder-dragging');snap();enforce()}function move(ev){if(!dragging)return;const f=ev.target.closest?.(sel);if(f&&root.contains(f)&&f.dataset.ucmuWasOpen==='0'){close(f);ev.preventDefault();ev.stopImmediatePropagation()}enforce()}function end(){if(!dragging)return;dragging=false;d.body.classList.remove('ucmu-folder-dragging');folders().forEach(f=>delete f.dataset.ucmuWasOpen);enforce()}d.addEventListener('click',ev=>{const f=ev.target.closest?.(sel);if(!f||!root.contains(f)||dragging||f.closest('#folderCtx'))return;f.dataset.ucmuUserOpen=f.dataset.ucmuUserOpen==='1'?'0':'1';w.setTimeout(()=>{if(f.dataset.ucmuUserOpen==='0')close(f)},30)},true);d.addEventListener('dragstart',start,true);d.addEventListener('dragenter',move,true);d.addEventListener('dragover',move,true);d.addEventListener('drop',()=>w.setTimeout(end,80),true);d.addEventListener('dragend',end,true);new w.MutationObserver(()=>enforce()).observe(root,{attributes:true,subtree:true,childList:true,attributeFilter:['class','style','open','aria-expanded']});w.setTimeout(enforce,200);w.setTimeout(enforce,800)}
function patchEdges(d,w){function arm(){d.querySelectorAll('.chat').forEach(c=>c.setAttribute('draggable','true'))}arm();new w.MutationObserver(arm).observe(d.getElementById('chatList')||d.body,{childList:true,subtree:true});d.addEventListener('contextmenu',ev=>{const chat=ev.target.closest?.('.chat');if(!chat)return;const ctx=d.getElementById('chatCtx');if(!ctx)return;ctx.classList.remove('hidden');ctx.style.left=Math.min(ev.clientX,d.documentElement.clientWidth-270)+'px';ctx.style.top=Math.min(ev.clientY,d.documentElement.clientHeight-190)+'px'},true)}
authFrame.addEventListener('load',patchAuth);chatFrame.addEventListener('load',patchChat);setTimeout(patchAuth,500);setTimeout(patchChat,500)
})();
</script>
