<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>U.C.M.U. Chat stitched v78</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#f4f7f6;font-family:Arial,Helvetica,sans-serif}
  .ucmu-frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;background:#000}
  #chatFrame{opacity:0;pointer-events:none;transition:opacity .42s ease}
  #authFrame{opacity:1;pointer-events:auto;transition:opacity .42s ease,filter .42s ease,transform .42s ease}
  body.chat-open #chatFrame{opacity:1;pointer-events:auto}
  body.chat-open #authFrame{opacity:0;pointer-events:none;filter:blur(10px);transform:scale(1.012)}
</style>
</head>
<body>
  <iframe id="authFrame" class="ucmu-frame" src="firebase-main-v63.html" title="U.C.M.U. start screen"></iframe>
  <iframe id="chatFrame" class="ucmu-frame" src="firebase-main-v42.html" title="U.C.M.U. chat"></iframe>
<script>
(() => {
  const authFrame = document.getElementById('authFrame');
  const chatFrame = document.getElementById('chatFrame');
  let opened = false;

  function safeDoc(frame){try{return frame.contentDocument || frame.contentWindow.document}catch(e){return null}}
  function openChat(){if(opened)return; opened=true; document.body.classList.add('chat-open'); unlockChatFrame()}

  function unlockChatFrame(){
    const doc=safeDoc(chatFrame); if(!doc)return;
    if(!doc.getElementById('ucmuStitchPatch')){
      const style=doc.createElement('style');
      style.id='ucmuStitchPatch';
      style.textContent='.login{display:none!important;opacity:0!important;pointer-events:none!important}body{overflow:hidden!important}';
      doc.head.appendChild(style);
    }
    doc.getElementById('login')?.classList.add('off');
    patchChatFrame();
  }

  function patchChatFrame(){
    const doc=safeDoc(chatFrame); if(!doc || doc.__ucmuV78Patched)return; doc.__ucmuV78Patched=true;
    const win=chatFrame.contentWindow;
    const style=doc.createElement('style');
    style.id='ucmuV78Fixes';
    style.textContent=`
      .feed{scroll-behavior:smooth!important;overflow-anchor:none!important}
      #chatList.ucmu-stable .chat,#folders.ucmu-stable .chat,#folders.ucmu-stable [class*="folder"],#chatList.ucmu-stable [class*="chat"]{animation:none!important}
      #chatList .chat,#folders .chat,#folders [class*="folder"],#chatList [class*="chat"]{transition:transform .22s ease,top .22s ease,margin .22s ease,background .18s ease,border-color .18s ease,opacity .18s ease!important}

      .msg.added,.msg.ucmu-new-glow{animation:ucmuMsgAppear .24s ease both, ucmuWhiteGlow 2.2s ease-out both!important}
      .msg.ucmu-new-glow .bubble{animation:ucmuBubbleGlow 2.2s ease-out both!important}
      @keyframes ucmuMsgAppear{from{opacity:0;transform:translateY(9px) scale(.985);filter:blur(4px)}to{opacity:1;transform:none;filter:none}}
      @keyframes ucmuWhiteGlow{0%{filter:drop-shadow(0 0 18px rgba(255,255,255,.78))}100%{filter:drop-shadow(0 0 0 rgba(255,255,255,0))}}
      @keyframes ucmuBubbleGlow{0%{box-shadow:0 0 0 1px rgba(255,255,255,.48),0 0 28px rgba(255,255,255,.35),0 10px 24px rgba(0,0,0,.18)}100%{box-shadow:0 0 0 1px rgba(255,255,255,0),0 0 0 rgba(255,255,255,0),0 10px 24px rgba(0,0,0,.18)}}

      .msg.ucmu-removing,.chat.ucmu-removing{pointer-events:none!important;animation:ucmuDeleteFly .36s cubic-bezier(.2,.8,.2,1) forwards!important;transform-origin:center!important}
      @keyframes ucmuDeleteFly{0%{opacity:1;transform:translateX(0) scale(1);filter:blur(0)}65%{opacity:.72;transform:translateX(18px) scale(.985);filter:blur(1px)}100%{opacity:0;transform:translateX(46px) scale(.94);filter:blur(8px);max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0}}

      #folders [class*="arrow"],#folders [class*="Arrow"],#folders [class*="chevron"],#folders [class*="Chevron"],#folders .caret,#folders .toggle,#folders summary::marker{display:none!important;opacity:0!important;width:0!important;margin:0!important}
      #folders summary{list-style:none!important} #folders summary::-webkit-details-marker{display:none!important}

      .ucmu-folder-drag-closed,.ucmu-folder-drag-closed *{animation:none!important;transition:none!important}
      .ucmu-folder-drag-open,.ucmu-folder-drag-open *{animation:none!important;transition:transform .18s ease,margin .18s ease,opacity .12s ease!important}
      body.ucmu-dragging-chat #folders [data-ucmu-was-open="0"] [class*="content"],
      body.ucmu-dragging-chat #folders [data-ucmu-was-open="0"] [class*="Content"],
      body.ucmu-dragging-chat #folders [data-ucmu-was-open="0"] [class*="body"],
      body.ucmu-dragging-chat #folders [data-ucmu-was-open="0"] [class*="Body"],
      body.ucmu-dragging-chat #folders [data-ucmu-was-open="0"] [class*="list"],
      body.ucmu-dragging-chat #folders [data-ucmu-was-open="0"] [class*="List"]{display:none!important;max-height:0!important;opacity:0!important;pointer-events:none!important}
    `;
    doc.head.appendChild(style);

    win.setTimeout(()=>{doc.getElementById('chatList')?.classList.add('ucmu-stable');doc.getElementById('folders')?.classList.add('ucmu-stable')},900);
    patchSafeSending(doc,win);
    patchNewMessageGlow(doc,win);
    patchDeleteAnimations(doc,win);
    patchFolderDraggingHard(doc,win);
    patchSmoothFeed(doc,win);
  }

  function activeChatKey(doc){
    const active=doc.querySelector('.chat.active,[data-chat].active,.folderChat.active,.folder-chat.active');
    const raw=active?.dataset?.chat||active?.dataset?.id||active?.textContent||'default-chat';
    return String(raw).trim().replace(/\s+/g,' ').slice(0,80)||'default-chat';
  }

  function patchSafeSending(doc,win){
    const input=doc.getElementById('input')||doc.querySelector('.msginput, textarea, .compose input');
    const send=doc.getElementById('send')||doc.querySelector('.send');
    const feed=doc.getElementById('feed');
    if(!input||!send||!feed)return;
    let lock=false;
    function scrollBottom(){const last=feed.querySelector('.msg:last-of-type'); if(last?.scrollIntoView)last.scrollIntoView({behavior:'smooth',block:'end',inline:'nearest'}); else feed.scrollTo({top:feed.scrollHeight,behavior:'smooth'})}
    function safeSend(ev){
      if(ev){ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation()}
      if(lock)return; const text=(input.value||'').trim(); if(!text)return; lock=true;
      const stamp=Date.now().toString(36); activeChatKey(doc);
      feed.insertAdjacentHTML('beforeend',`<article class="msg added ucmu-new-glow" data-ucmu-safe-msg="${stamp}"><div class="ava s"></div><div class="bubble"><div class="meta"><span class="red">Director</span><span class="time">сейчас</span></div><div class="txt"></div></div></article>`);
      const msg=feed.querySelector(`[data-ucmu-safe-msg="${stamp}"] .txt`); if(msg)msg.textContent=text;
      input.value=''; input.dispatchEvent(new win.Event('input',{bubbles:true})); scrollBottom();
      win.setTimeout(()=>{lock=false},90);
    }
    send.addEventListener('click',safeSend,true);
    input.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&!ev.shiftKey)safeSend(ev)},true);
  }

  function patchNewMessageGlow(doc,win){
    const feed=doc.getElementById('feed'); if(!feed)return;
    new win.MutationObserver(muts=>{
      muts.forEach(m=>Array.from(m.addedNodes).forEach(n=>{
        if(n.nodeType!==1)return;
        const items=n.classList?.contains('msg')?[n]:Array.from(n.querySelectorAll?.('.msg')||[]);
        items.forEach(el=>{el.classList.add('ucmu-new-glow'); win.setTimeout(()=>el.classList.remove('ucmu-new-glow'),2400)})
      }))
    }).observe(feed,{childList:true,subtree:false});
  }

  function patchSmoothFeed(doc,win){
    const feed=doc.getElementById('feed'); if(!feed)return; let t=0;
    new win.MutationObserver(muts=>{
      if(!muts.some(m=>Array.from(m.addedNodes).some(n=>n.nodeType===1&&(n.classList?.contains('msg')||n.querySelector?.('.msg')))))return;
      win.clearTimeout(t); t=win.setTimeout(()=>{const last=feed.querySelector('.msg:last-of-type'); if(last?.scrollIntoView)last.scrollIntoView({behavior:'smooth',block:'end',inline:'nearest'}); else feed.scrollTo({top:feed.scrollHeight,behavior:'smooth'})},32)
    }).observe(feed,{childList:true,subtree:false});
  }

  function patchDeleteAnimations(doc,win){
    doc.addEventListener('click',ev=>{
      const btn=ev.target.closest?.('[data-a="delete"],.dangerPrimary,#confirmDelete,.chatAction.danger,.selectedAction.danger');
      if(!btn)return;
      const ctx=doc.getElementById('ctx');
      const chatCtx=doc.getElementById('chatCtx');
      let target=null;
      if(chatCtx && !chatCtx.classList.contains('hidden')) target=doc.querySelector('.chat.active')||doc.querySelector('.chat:hover');
      if(!target && ctx && !ctx.classList.contains('hidden')) target=doc.querySelector('.msg:hover,.msg.selected,.msg.active')||ctx.__targetMsg;
      if(!target) target=btn.closest('.msg,.chat');
      if(target) target.classList.add('ucmu-removing');
    },true);
  }

  function patchFolderDraggingHard(doc,win){
    const foldersRoot=doc.getElementById('folders'); if(!foldersRoot)return;
    let dragging=false;
    let startX=0,startY=0;

    const folderSelector='[data-folder-id],.folderItem,.folder-item,.folderRow,.folder-row,.folderCard,.folder-card,.folder,details';
    function folderItems(){return Array.from(foldersRoot.querySelectorAll(folderSelector)).filter(el=>el.id!=='folderBtn'&&!el.closest('#folderModal,#folderStyleModal,#folderCtx'))}
    function isChat(el){return !!el?.closest?.('.chat,[data-chat],.folderChat,.folder-chat')}
    function getFolderFromPoint(x,y){
      const prev=[];
      let el=doc.elementFromPoint(x,y);
      while(el){
        const f=el.closest?.(folderSelector);
        if(f && foldersRoot.contains(f))return f;
        prev.push(el); el.style.pointerEvents='none'; el=doc.elementFromPoint(x,y);
      }
      prev.forEach(e=>e.style.pointerEvents='');
      return null;
    }
    function closestFolder(el){const f=el?.closest?.(folderSelector); return f&&foldersRoot.contains(f)?f:null}
    function openState(folder){
      if(!folder)return false;
      if(folder.open===true)return true;
      if(folder.getAttribute('aria-expanded')==='true')return true;
      if(folder.dataset?.open==='true'||folder.dataset?.expanded==='true')return true;
      if(/\b(open|opened|expanded|active|is-open|folderOpen|folder-open|show|shown)\b/i.test(String(folder.className||'')))return true;
      const kids=Array.from(folder.children||[]).filter(c=>!/arrow|chevron|title|head|name/i.test(c.className||''));
      if(kids.some(c=>c.offsetHeight>8 && !c.classList.contains('hidden')))return true;
      const next=folder.nextElementSibling;
      if(next&&foldersRoot.contains(next)&&/folder|chat|list|body|content/i.test(next.className||'')&&!next.classList.contains('hidden')&&next.offsetHeight>8)return true;
      return false;
    }
    function snapshotFolders(){
      folderItems().forEach(f=>{
        const open=openState(f);
        f.dataset.ucmuWasOpen=open?'1':'0';
        f.dataset.ucmuClassBefore=String(f.className||'');
        f.dataset.ucmuAriaBefore=f.getAttribute('aria-expanded')||'';
        if(f.open!==undefined)f.dataset.ucmuOpenBefore=f.open?'1':'0';
      });
    }
    function forceClosed(f){
      if(!f||f.dataset.ucmuWasOpen==='1')return;
      f.className=f.dataset.ucmuClassBefore||f.className;
      f.classList.add('ucmu-folder-drag-closed');
      f.setAttribute('aria-expanded','false');
      if(f.open!==undefined)f.open=false;
      Array.from(f.children||[]).forEach(c=>{
        if(/content|body|list|chats|items/i.test(c.className||'')){c.classList.add('hidden'); c.style.display='none'; c.style.maxHeight='0px'; c.style.opacity='0'}
      });
      const next=f.nextElementSibling;
      if(next&&foldersRoot.contains(next)&&/folder|chat|list|body|content/i.test(next.className||'')){next.classList.add('hidden');next.style.display='none';next.style.maxHeight='0px';next.style.opacity='0'}
    }
    function startDragMaybe(ev){
      if(!isChat(ev.target))return;
      dragging=false; startX=ev.clientX||0; startY=ev.clientY||0; snapshotFolders();
    }
    function moveMaybe(ev){
      if(!doc.body.classList.contains('ucmu-dragging-chat') && isChat(doc.elementFromPoint(ev.clientX||startX,ev.clientY||startY))){}
      if(!dragging && (Math.abs((ev.clientX||0)-startX)>4 || Math.abs((ev.clientY||0)-startY)>4)){
        dragging=true; doc.body.classList.add('ucmu-dragging-chat'); snapshotFolders();
      }
      if(!dragging)return;
      const f=getFolderFromPoint(ev.clientX||0,ev.clientY||0)||closestFolder(ev.target);
      if(!f)return;
      if(f.dataset.ucmuWasOpen==='1'){
        f.classList.add('ucmu-folder-drag-open');
        return;
      }
      forceClosed(f);
      ev.preventDefault(); ev.stopPropagation(); ev.stopImmediatePropagation();
    }
    function endDrag(){
      if(!dragging)return;
      dragging=false; doc.body.classList.remove('ucmu-dragging-chat');
      folderItems().forEach(f=>{f.classList.remove('ucmu-folder-drag-closed','ucmu-folder-drag-open')});
    }

    // window capture срабатывает раньше document-обработчиков старого чата.
    win.addEventListener('pointerdown',startDragMaybe,true);
    win.addEventListener('mousedown',startDragMaybe,true);
    win.addEventListener('dragstart',ev=>{if(isChat(ev.target)){dragging=true;doc.body.classList.add('ucmu-dragging-chat');snapshotFolders()}},true);
    win.addEventListener('pointermove',moveMaybe,true);
    win.addEventListener('mousemove',moveMaybe,true);
    win.addEventListener('dragenter',moveMaybe,true);
    win.addEventListener('dragover',moveMaybe,true);
    win.addEventListener('pointerup',endDrag,true);
    win.addEventListener('mouseup',endDrag,true);
    win.addEventListener('drop',endDrag,true);
    win.addEventListener('dragend',endDrag,true);

    // Даже если старая логика успела открыть закрытую папку — закрываем назад на следующем кадре.
    new win.MutationObserver(()=>{
      if(!dragging)return;
      folderItems().forEach(f=>{if(f.dataset.ucmuWasOpen==='0')forceClosed(f)})
    }).observe(foldersRoot,{attributes:true,childList:true,subtree:true,attributeFilter:['class','style','open','aria-expanded']});
  }

  function patchAuthFrame(){
    const doc=safeDoc(authFrame); if(!doc)return;
    if(!doc.getElementById('ucmuAuthOnlyPatch')){
      const style=doc.createElement('style'); style.id='ucmuAuthOnlyPatch';
      style.textContent='.app,.modal{display:none!important;opacity:0!important;pointer-events:none!important}.auth{display:grid!important}html,body{overflow:hidden!important;background:#000!important}';
      doc.head.appendChild(style);
    }
    Array.from(doc.querySelectorAll('button')).forEach(btn=>{if((btn.textContent||'').trim().toUpperCase().includes('ВОЙТИ'))btn.addEventListener('click',()=>setTimeout(openChat,260),{once:false})});
    const observer=new MutationObserver(()=>{const auth=doc.querySelector('.auth');const app=doc.querySelector('.app'); if((auth&&auth.classList.contains('hidden'))||(app&&app.classList.contains('active')))openChat()});
    observer.observe(doc.documentElement,{attributes:true,subtree:true,attributeFilter:['class']});
  }

  authFrame.addEventListener('load',patchAuthFrame);
  chatFrame.addEventListener('load',unlockChatFrame);
  setTimeout(patchAuthFrame,500);
  setTimeout(unlockChatFrame,500);
})();
</script>
</body>
</html>
