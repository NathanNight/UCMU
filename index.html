    .msg.sticker-msg .bubble{background:transparent!important;border:0!important;box-shadow:none!important;padding:0!important;overflow:visible!important}.msg.sticker-msg .bubble::before,.msg.sticker-msg .bubble::after,.msg.sticker-msg::before,.msg.sticker-msg::after{content:none!important;display:none!important;animation:none!important}.msg.sticker-msg.ucmu-new-flash .bubble::before,.msg.sticker-msg.ucmu-new-flash .bubble::after{content:none!important;display:none!important}.msg.sticker-msg .meta{display:none!important}.msg.sticker-msg .sticker{background:transparent!important;border:0!important;box-shadow:none!important;margin-top:0!important;position:relative!important;overflow:visible!important;animation:stickerBounce .42s cubic-bezier(.16,.86,.22,1) both!important}.msg.sticker-msg .sticker::before,.msg.sticker-msg .sticker::after{content:none!important;display:none!important}@keyframes stickerBounce{0%{opacity:0;transform:scale(.72);filter:blur(6px)}55%{opacity:1;transform:scale(1.16);filter:blur(0)}100%{opacity:1;transform:scale(1);filter:blur(0)}}

nt;z-index:80!important}

<body>
  <div id="appRoot"></div>
  <script type="module" src="js/app.js?v=163"></script>
  <script>
    (()=>{
      const $=s=>document.querySelector(s);
      function updateSend(){const input=$('#input'),send=$('#send');if(!input||!send)return;const has=!!input.value.trim();send.classList.toggle('hasText',has);send.classList.toggle('isMic',!has);send.textContent=has?'➤':'🎙';send.title=has?'Отправить':'Голосовое сообщение'}
      function placeStickers(e){const panel=$('#stickers'),btn=$('#stickerBtn');if(!panel||!btn)return;e&&e.preventDefault();e&&e.stopImmediatePropagation();panel.classList.toggle('hidden');const r=btn.getBoundingClientRect();panel.style.left='auto';panel.style.right=(window.innerWidth-r.right)+'px';panel.style.top='auto';panel.style.bottom=(window.innerHeight-r.top+10)+'px'}
      function placeContacts(){const side=$('#side'),x=(side&&side.getBoundingClientRect().width)||330;['#contactsModal','#members.ucmu-contacts-mode'].forEach(sel=>{const el=$(sel);if(el){el.style.left=x+'px';el.style.right='auto';el.style.top='96px'}})}
      function polishDelete(){const m=$('#deleteModal.messageDeleteStrict');if(!m)return;const t=m.querySelector('.ph span');if(t)t.textContent='УДАЛИТЬ?';const h=m.querySelector('.deleteHint');if(h)h.textContent=''}
      function bind(){const input=$('#input');if(input&&!input.__ucmu164){input.__ucmu164=1;input.addEventListener('input',updateSend);input.addEventListener('change',updateSend)}const st=$('#stickerBtn');if(st&&!st.__ucmu164){st.__ucmu164=1;st.addEventListener('click',placeStickers,true)}updateSend();placeContacts();polishDelete()}
      document.addEventListener('click',e=>{if(e.target.closest('#contactsBtn'))setTimeout(placeContacts,0);if(e.target.closest('[data-a="delete"]'))setTimeout(polishDelete,0)},true);
      document.addEventListener('DOMContentLoaded',()=>{bind();setInterval(bind,600)});
    })();
  </script>
