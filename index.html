<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>U.C.M.U CHAT</title><style>

</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="umb"></div><div><b>U.C.M.U</b><small>SECURE COMMUNICATIONS</small></div></div><div class="tools"><button class="btn square" id="newChat">+</button><div class="search" id="search"><button id="sBtn">⌕</button><input id="sInput" placeholder="Поиск"></div></div><div class="list" id="list"></div><button class="btn collapse">Свернуть</button></aside><main class="main"><header class="head"><div class="title" id="title"></div><div class="headBtns"><button class="hbtn" id="unread">✉</button><button class="hbtn" id="memBtn">Участники</button></div></header><section class="msgs" id="msgs"></section><form class="composer" id="form"><input id="input" placeholder="Сообщение"><button class="send">SEND</button></form></main><aside class="members hidden" id="members"><div class="mHead"><b>Участники</b><button class="hbtn" id="mClose">×</button></div><div id="mList"></div></aside></div><div class="undo" id="undo"><span id="uTxt">Удаление через 5</span><button id="uBtn">Вернуть</button></div><div class="backdrop" id="bd"></div><div class="modal" id="modal"><div class="mTop"><b>Новый чат</b><button class="close" id="x">×</button></div><div class="field"><label>Название</label><input id="nName"></div><div class="field"><label>Цвет</label><div class="picks" id="colors"></div></div><div class="field"><label>Иконка</label><div class="picks" id="icons"></div></div><div class="actions"><button class="secondary" id="cancel">Отмена</button><button class="primary" id="create">Создать</button></div></div><script>
const people=[['Director','Командование','on'],['Red Queen','AI','on'],['Alice','Оператор','on'],['Leon','Разведка','on'],['Jill','Тактик','on'],['Chris','Штурм','on'],['Hunk','Спецотряд','off'],['Rebecca','Медик','on'],['Wesker','Контроль','off']];let chats=[{id:'gen',name:'Общий чат',icon:'☂',color:'#d71920',unread:0,m:[0,1,2,3,4,5],msgs:[['Alice','15:42','Всем привет! Как обстановка?'],['Leon','15:43','Стабильно. Работаем по плану.','file'],['Jill','15:45','Фото с объекта прилагаю.','sticker'],['Chris','15:46','Отлично сработано!']]},{id:'ops',name:'Оперативный',icon:'◆',color:'#7682ff',unread:1,m:[0,3,4,6],msgs:[['Hunk','15:50','Группа на позиции.']]},{id:'tech',name:'Техотдел',icon:'⚙',color:'#41d28a',unread:0,m:[0,1,7],msgs:[['Red Queen','15:55','Системы стабильны.']]}],folders=[{id:'f1',name:'Отряды',icon:'▣',closed:false,ids:['ops','tech']}],active='gen',pending=null;const $=id=>document.getElementById(id);function topChats(){let s=new Set(folders.flatMap(f=>f.ids));return chats.filter(c=>!s.has(c.id))}function tile(c){return `<div class="chat ${c.id===active?'active':''} ${c.unread?'hasUnread':''}" data-id="${c.id}"><div class="ava" style="color:${c.color}">${c.icon}</div><div class="meta"><div class="name">${c.name}</div><div class="sub">${c.m.length} участников</div></div><div class="badge">${c.unread||''}</div></div>`}function renderList(){list.innerHTML='';topChats().forEach(c=>list.insertAdjacentHTML('beforeend',tile(c)));folders.forEach(f=>{let el=document.createElement('div');el.className='folder '+(f.closed?'closed':'');el.dataset.f=f.id;el.innerHTML=`<div class="folderHead"><div class="folderIcon">${f.icon}</div><div class="name">${f.name}</div><div class="arrow">${f.closed?'›':'⌄'}</div></div><div class="folderItems"></div>`;let box=el.querySelector('.folderItems');f.ids.map(id=>chats.find(c=>c.id===id)).filter(Boolean).forEach(c=>box.insertAdjacentHTML('beforeend',tile(c)));list.appendChild(el)});bind()}function renderChat(){let c=chats.find(x=>x.id===active)||chats[0];active=c.id;c.unread=0;title.textContent='# '+c.name;msgs.innerHTML='';c.msgs.forEach((m,i)=>addMsg(m,i,false));mList.innerHTML='';c.m.map(i=>people[i]).forEach(p=>mList.insertAdjacentHTML('beforeend',`<div class="member"><div class="ava">${p[0][0]}</div><div><b>${p[0]}</b><span class="role">${p[1]}</span></div><i class="status ${p[2]==='off'?'off':''}"></i></div>`));renderList()}function addMsg(m,i,scroll=true){let d=document.createElement('div');d.className='msg '+(m[0]==='Director'?'me':'');d.dataset.i=i;let ex=m[3]==='file'?'<div class="file"><div class="pdf">PDF</div><div><b>report_q2.pdf</b><br><small>24 MB · удаление через 6 дней</small></div></div>':m[3]==='sticker'?'<div class="sticker">🛡️</div>':'';d.innerHTML=`<div class="ava">${m[0][0]}</div><div class="bubble"><span class="author">${m[0]}</span> <span class="time">${m[1]}</span><div class="text">${m[2]}</div>${ex}</div>`;d.oncontextmenu=e=>{e.preventDefault();startDelete(d)};msgs.appendChild(d);if(scroll)msgs.scrollTop=msgs.scrollHeight}function bind(){document.querySelectorAll('.chat').forEach(t=>{t.onclick=e=>{if(drag&&drag.moved)return;active=t.dataset.id;renderChat()};t.onmousedown=startDrag});document.querySelectorAll('.folderHead').forEach(h=>h.onclick=()=>{let f=folders.find(x=>x.id===h.parentElement.dataset.f);f.closed=!f.closed;renderList()})}function flip(fn){let els=[...document.querySelectorAll('.chat,.folder')],first=new Map(els.map(e=>[e.dataset.id||e.dataset.f,e.getBoundingClientRect()]));fn();[...document.querySelectorAll('.chat,.folder')].forEach(e=>{let r=first.get(e.dataset.id||e.dataset.f);if(!r)return;let n=e.getBoundingClientRect(),dx=r.left-n.left,dy=r.top-n.top;if(dx||dy){e.style.transition='none';e.style.transform=`translate(${dx}px,${dy}px)`;e.offsetHeight;e.style.transition='transform .22s cubic-bezier(.2,.8,.2,1)';e.style.transform='';setTimeout(()=>e.style.transition='',240)}})}let drag=null;function startDrag(e){if(e.button!==0)return;let t=e.currentTarget,r=t.getBoundingClientRect();drag={id:t.dataset.id,t,orig:r,x:e.clientX-r.left,y:e.clientY-r.top,sx:e.clientX,sy:e.clientY,moved:false};document.addEventListener('mousemove',moveDrag);document.addEventListener('mouseup',endDrag)}function moveDrag(e){if(!drag)return;if(!drag.moved&&Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)<4)return;if(!drag.moved){drag.moved=true;drag.t.classList.add('dragSource');let g=drag.t.cloneNode(true);g.className+=' ghost';g.style.width=drag.orig.width+'px';g.style.height=drag.orig.height+'px';document.body.appendChild(g);drag.g=g}drag.g.style.transform=`translate(${e.clientX-drag.x}px,${e.clientY-drag.y}px)`;let target=[...document.querySelectorAll('.chat:not(.dragSource)')].find(t=>{let r=t.getBoundingClientRect();return e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom});if(target&&target.dataset.id!==drag.id){let a=chats.findIndex(c=>c.id===drag.id),b=chats.findIndex(c=>c.id===target.dataset.id);if(a>-1&&b>-1&&a!==b)flip(()=>{let[it]=chats.splice(a,1);chats.splice(b,0,it);renderList()})}}function endDrag(){document.removeEventListener('mousemove',moveDrag);document.removeEventListener('mouseup',endDrag);if(!drag)return;if(!drag.moved){drag=null;return}let g=drag.g,fin=[...document.querySelectorAll('.chat')].find(t=>t.dataset.id===drag.id),r=fin?fin.getBoundingClientRect():drag.orig;g.style.transition='transform .22s cubic-bezier(.2,.8,.2,1),opacity .18s';g.style.transform=`translate(${r.left}px,${r.top}px)`;setTimeout(()=>{g.remove();document.querySelectorAll('.dragSource').forEach(x=>x.classList.remove('dragSource'))},230);drag=null}function startDelete(el){if(pending)return;let c=chats.find(x=>x.id===active),idx=+el.dataset.i,sec=5;el.classList.add('pending');undo.classList.add('show');uTxt.textContent='Удаление через '+sec;pending={el,c,idx,t:setInterval(()=>{sec--;uTxt.textContent='Удаление через '+sec;if(sec<=0){clearInterval(pending.t);el.classList.add('remove');setTimeout(()=>{c.msgs.splice(idx,1);pending=null;undo.classList.remove('show');renderChat()},340)}},1000)}}uBtn.onclick=()=>{if(!pending)return;clearInterval(pending.t);pending.el.classList.remove('pending');pending=null;undo.classList.remove('show')};form.onsubmit=e=>{e.preventDefault();let v=input.value.trim();if(!v)return;chats.find(c=>c.id===active).msgs.push(['Director','сейчас',v]);input.value='';renderChat()};memBtn.onclick=()=>members.classList.toggle('hidden');mClose.onclick=()=>members.classList.add('hidden');unread.onclick=()=>{let c=chats.find(x=>x.id!==active)||chats[0];c.unread=(c.unread||0)+1;renderList();let t=document.querySelector(`.chat[data-id="${c.id}"]`);if(t){t.classList.add('flash');setTimeout(()=>t.classList.remove('flash'),2100)}};sBtn.onclick=()=>{search.classList.add('open');setTimeout(()=>sInput.focus(),30)};sInput.onblur=()=>{if(!sInput.value)setTimeout(()=>search.classList.remove('open'),110)};sInput.oninput=()=>{let q=sInput.value.toLowerCase();document.querySelectorAll('.chat').forEach(t=>t.style.display=t.textContent.toLowerCase().includes(q)?'flex':'none')};let cVals=['#d71920','#7682ff','#41d28a','#ff9b32','#b46cff'],iVals=['☂','◆','▣','●','⚙','✚'],pC=cVals[0],pI=iVals[0];function picks(){colors.innerHTML=cVals.map(c=>`<button class="pick" data-c="${c}" style="background:${c}"></button>`).join('');icons.innerHTML=iVals.map(i=>`<button class="pick" data-i="${i}">${i}</button>`).join('');colors.children[0].classList.add('sel');icons.children[0].classList.add('sel');[...colors.children].forEach(b=>b.onclick=e=>{e.preventDefault();pC=b.dataset.c;[...colors.children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel')});[...icons.children].forEach(b=>b.onclick=e=>{e.preventDefault();pI=b.dataset.i;[...icons.children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel')})}function openM(){picks();nName.value='';bd.classList.add('show');modal.classList.add('show');setTimeout(()=>nName.focus(),40)}function closeM(){bd.classList.remove('show');modal.classList.remove('show')}newChat.onclick=openM;x.onclick=closeM;cancel.onclick=e=>{e.preventDefault();closeM()};create.onclick=e=>{e.preventDefault();let id='c'+Date.now();chats.push({id,name:nName.value.trim()||'Новый чат',icon:pI,color:pC,unread:0,m:[0],msgs:[['Director','сейчас','Чат создан.']]});active=id;closeM();renderChat()};renderList();renderChat();
