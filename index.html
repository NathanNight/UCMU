<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>U.C.M.U Chat</title>
<style>
:root{--bg:#060707;--panel:#101415;--panel2:#151b1c;--line:rgba(255,255,255,.09);--red:#e12b32;--red2:#741216;--text:#f2f2f2;--muted:#9da4a6;--green:#2ee16d;--ghost:#222b2d}
*{box-sizing:border-box}html,body{height:100%;margin:0;background:#020303;color:var(--text);font-family:Arial,Helvetica,sans-serif;overflow:hidden}button,input{font:inherit;color:inherit}button{cursor:pointer;border:0}
.app{height:100vh;display:grid;grid-template-columns:300px 1fr 280px;background:radial-gradient(circle at 52% 28%,rgba(180,0,0,.10),transparent 32%),linear-gradient(135deg,#050606,#0b0d0e 55%,#040505);position:relative;isolation:isolate}.app:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0 1px,transparent 1px 4px);opacity:.55;pointer-events:none;z-index:-1}
.sidebar,.members{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(0,0,0,.16)),rgba(11,13,14,.88);border-right:1px solid var(--line);padding:18px;min-width:0}.members{border-right:0;border-left:1px solid var(--line);transform:none;transition:transform .26s cubic-bezier(.2,.8,.2,1)}.members.closed{transform:translateX(100%)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:20px}.umb{width:40px;height:40px;border-radius:50%;background:conic-gradient(#fff 0 45deg,#c9151c 45deg 90deg,#fff 90deg 135deg,#c9151c 135deg 180deg,#fff 180deg 225deg,#c9151c 225deg 270deg,#fff 270deg 315deg,#c9151c 315deg);box-shadow:0 0 0 2px rgba(255,255,255,.12),0 0 20px rgba(255,0,0,.15)}.logo b{display:block;font-size:24px;letter-spacing:.03em}.logo span{display:block;color:var(--red);font-size:11px;letter-spacing:.18em;margin-top:4px}.tools{display:flex;gap:8px;margin-bottom:14px}.tool{width:40px;height:38px;background:rgba(255,255,255,.055);border:1px solid var(--line);display:grid;place-items:center}.tool:hover{background:rgba(255,255,255,.09)}.searchWrap{overflow:hidden;width:40px;transition:width .24s cubic-bezier(.2,.8,.2,1);display:flex;background:rgba(255,255,255,.055);border:1px solid var(--line);height:38px}.searchWrap.open{width:100%}.searchWrap button{width:38px;flex:0 0 auto;background:transparent}.searchWrap input{min-width:0;flex:1;background:transparent;border:0;outline:0;padding:0 10px;color:#fff}.list{display:flex;flex-direction:column;gap:8px;position:relative}.tile,.folderHead{height:58px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 10px;user-select:none;transition:transform .22s cubic-bezier(.2,.8,.2,1),background .18s ease,opacity .18s ease,filter .18s ease}.tile:hover,.folderHead:hover{background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.035))}.tile.drag-source{opacity:0}.avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#1b2426;border:1px solid rgba(255,255,255,.12);position:relative;flex:0 0 auto}.avatar:after{content:"";position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(46,225,109,.7)}.tileInfo{min-width:0;flex:1}.tileName{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tileSub{font-size:12px;color:var(--muted);margin-top:3px}.unread{min-width:20px;height:20px;border-radius:999px;background:var(--red);display:none;place-items:center;font-size:11px;font-weight:800;box-shadow:0 0 14px rgba(225,43,50,.35)}.tile.hasUnread .unread{display:grid;animation:unreadIn .24s cubic-bezier(.2,.8,.2,1)}.tile.flash .unread{animation:unreadFlash .72s ease}.tile.flash{animation:tileFlash .72s ease}.folder{display:flex;flex-direction:column;gap:8px}.folderHead{height:54px}.folderIcon{width:34px;height:34px;display:grid;place-items:center;background:linear-gradient(135deg,#242b2d,#111617);border:1px solid rgba(255,255,255,.12)}.folderItems{display:flex;flex-direction:column;gap:8px;overflow:hidden;max-height:260px;transition:max-height .28s cubic-bezier(.2,.8,.2,1),opacity .2s ease,transform .24s ease}.folder.closed .folderItems{max-height:0;opacity:0;transform:translateY(-5px)}.folderArrow{margin-left:auto;color:var(--muted)}
.dragGhost{position:fixed;left:0;top:0;width:264px;height:58px;z-index:9999;pointer-events:none;opacity:1!important;will-change:transform;box-shadow:0 20px 40px rgba(0,0,0,.45),0 0 0 1px rgba(255,60,60,.25);background:#171f21}.placeholder{height:58px;border:1px dashed rgba(255,255,255,.25);background:rgba(255,255,255,.035)}
.main{min-width:0;display:grid;grid-template-rows:auto 1fr auto}.header{height:74px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025)}.chatTitle{font-size:24px;font-weight:900}.headBtns{display:flex;gap:8px}.headBtn{height:38px;min-width:42px;background:rgba(255,255,255,.06);border:1px solid var(--line)}.headBtn:hover{background:rgba(255,255,255,.10)}.messages{overflow:auto;padding:24px 28px 36px;display:flex;flex-direction:column;gap:16px}.msg{display:grid;grid-template-columns:42px minmax(0,760px);gap:12px;align-items:start;animation:msgIn .28s ease both}.bubble{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));border:1px solid var(--line);padding:14px 16px;min-height:58px}.msg.me .bubble{background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.035));border-color:rgba(255,255,255,.14)}.author{font-weight:900;color:#ff5b63}.time{font-size:12px;color:var(--muted);margin-left:2px}.text{margin-top:8px;line-height:1.35}.file{margin-top:12px;width:340px;max-width:100%;height:66px;border:1px solid rgba(225,43,50,.55);display:flex;align-items:center;gap:12px;padding:10px;background:linear-gradient(90deg,rgba(225,43,50,.25),rgba(255,255,255,.025))}.pdf{width:44px;height:44px;background:var(--red);display:grid;place-items:center;font-weight:900}.msg.deleting{animation:msgOut .35s ease forwards}.sticker{font-size:54px;line-height:1;margin-top:10px;filter:drop-shadow(0 0 8px rgba(255,255,255,.12))}.composer{height:76px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 20px;background:rgba(255,255,255,.025)}.composer input{flex:1;height:42px;background:rgba(255,255,255,.055);border:1px solid transparent;outline:0;padding:0 14px}.composer input:focus{border-color:transparent;box-shadow:none}.send{height:42px;padding:0 18px;background:linear-gradient(135deg,var(--red),var(--red2));font-weight:900}.memberHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.memberHead b{font-size:18px}.member{display:flex;align-items:center;gap:10px;height:48px;border:1px solid var(--line);background:rgba(255,255,255,.04);padding:0 10px;margin-bottom:8px}.role{font-size:12px;color:var(--muted)}.undo{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:2000;background:#121718;border:1px solid rgba(255,255,255,.16);padding:12px 14px;display:none;align-items:center;gap:12px;box-shadow:0 20px 50px rgba(0,0,0,.6)}.undo.show{display:flex;animation:msgIn .2s ease}.undo button{background:rgba(255,255,255,.08);border:1px solid var(--line);height:32px;padding:0 12px}.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(12px);z-index:1500;display:none}.modalBackdrop.show{display:block;animation:fadeIn .2s ease}.modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:1600;width:min(430px,calc(100vw - 34px));background:linear-gradient(180deg,rgba(34,39,40,.96),rgba(12,15,16,.96));border:1px solid rgba(255,255,255,.16);box-shadow:0 35px 90px rgba(0,0,0,.75),0 0 45px rgba(225,43,50,.10);padding:18px;display:none}.modal.show{display:block;animation:modalIn .24s cubic-bezier(.2,.8,.2,1)}.modal:before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:glitch 1.5s infinite}.modalTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.close{width:34px;height:34px;background:rgba(255,255,255,.06);border:1px solid var(--line)}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.field input{height:42px;background:rgba(255,255,255,.06);border:1px solid var(--line);outline:0;padding:0 12px}.colors,.icons{display:flex;gap:8px;flex-wrap:wrap}.swatch,.iconPick{width:34px;height:34px;border:1px solid var(--line);background:#222;display:grid;place-items:center}.swatch.sel,.iconPick.sel{outline:2px solid rgba(255,255,255,.55)}.modalActions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.primary{height:40px;padding:0 16px;background:linear-gradient(135deg,var(--red),var(--red2));font-weight:900}.secondary{height:40px;padding:0 16px;background:rgba(255,255,255,.07);border:1px solid var(--line)}
@keyframes msgIn{from{opacity:0;filter:blur(10px);transform:translateY(8px) scale(.985)}to{opacity:1;filter:blur(0);transform:none}}@keyframes msgOut{to{opacity:0;filter:blur(12px);transform:translateY(-8px) scale(.985)}}@keyframes unreadIn{from{opacity:0;filter:blur(8px);transform:scale(.55)}to{opacity:1;filter:blur(0);transform:scale(1)}}@keyframes unreadFlash{0%,100%{background:var(--red);box-shadow:0 0 14px rgba(225,43,50,.35)}35%{background:#fff;color:#111;box-shadow:0 0 25px rgba(255,255,255,1),0 0 50px rgba(255,255,255,.55)}}@keyframes tileFlash{35%{box-shadow:0 0 26px rgba(255,255,255,.25)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes modalIn{from{opacity:0;filter:blur(12px);transform:translate(-50%,-48%) scale(.97)}to{opacity:1;filter:blur(0);transform:translate(-50%,-50%) scale(1)}}@keyframes glitch{0%,90%,100%{opacity:.35;transform:none}92%{opacity:1;transform:translateX(-14px)}94%{transform:translateX(18px)}96%{transform:none}}
@media(max-width:900px){.app{grid-template-columns:260px 1fr}.members{position:absolute;right:0;top:0;bottom:0;width:280px;z-index:1200}.members.closed{transform:translateX(100%)}}@media(max-width:620px){.app{grid-template-columns:76px 1fr}.sidebar{padding:12px 8px}.logo b,.logo span,.tileInfo,.folderHead .tileName,.folderArrow,.tools .searchWrap{display:none}.logo{justify-content:center}.tools{flex-direction:column}.tile,.folderHead{padding:0;justify-content:center}.unread{position:absolute;right:4px;top:4px}.messages{padding:18px 12px}.header{padding:0 12px}.chatTitle{font-size:18px}.msg{grid-template-columns:34px 1fr}.bubble{padding:12px}}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="logo"><div class="umb"></div><div><b>U.C.M.U</b><span>SECURE CHAT</span></div></div>
    <div class="tools"><button class="tool" id="newChatBtn">+</button><div class="searchWrap" id="searchWrap"><button id="searchBtn">⌕</button><input id="searchInput" placeholder="Поиск"></div></div>
    <div class="list" id="chatList"></div>
  </aside>
  <main class="main">
    <header class="header"><div class="chatTitle" id="chatTitle"></div><div class="headBtns"><button class="headBtn" id="testUnread">✉</button><button class="headBtn" id="membersBtn">Участники</button></div></header>
    <section class="messages" id="messages"></section>
    <form class="composer" id="composer"><input id="msgInput" placeholder="Сообщение"><button class="send">SEND</button></form>
  </main>
  <aside class="members" id="members"><div class="memberHead"><b>Участники</b><button class="headBtn" id="closeMembers">×</button></div><div id="memberList"></div></aside>
</div>
<div class="undo" id="undo"><span id="undoText">Удаление через 5</span><button id="undoBtn">Вернуть</button></div>
<div class="modalBackdrop" id="backdrop"></div><div class="modal" id="modal"><div class="modalTop"><b>Новый чат</b><button class="close" id="modalClose">×</button></div><div class="field"><label>Название</label><input id="newName" autocomplete="off"></div><div class="field"><label>Цвет</label><div class="colors" id="colors"></div></div><div class="field"><label>Иконка</label><div class="icons" id="icons"></div></div><div class="modalActions"><button class="secondary" id="cancelModal">Отмена</button><button class="primary" id="createChat">Создать</button></div></div>
<script>
const membersData=[['Director','Командование'],['Red Queen','AI'],['Alice','Оператор'],['Leon','Разведка'],['Jill','Тактик'],['Chris','Штурм'],['Hunk','Спецотряд'],['Rebecca','Медик'],['Wesker','Контроль']];
let chats=[{id:'general',name:'Общий чат',icon:'☂',color:'#e12b32',unread:0,members:[0,1,2,3,4,5],msgs:[['Alice','15:42','Всем привет! Как обстановка?'],['Leon','15:43','Стабильно. Работаем по плану.','file'],['Jill','15:45','Фото с объекта прилагаю.','sticker'],['Chris','15:46','Отлично сработано!']]},{id:'ops',name:'Оперативный',icon:'◆',color:'#6c7cff',unread:1,members:[0,3,4,6],msgs:[['Hunk','15:50','Группа на позиции.']]},{id:'tech',name:'Техотдел',icon:'⚙',color:'#3fd08c',unread:0,members:[0,1,7],msgs:[['Red Queen','15:55','Системы стабильны.']]}];
let folders=[{id:'f1',name:'Отряды',icon:'▣',color:'#e12b32',closed:false,chatIds:['ops','tech']}];let active='general';let deletePending=null;
const chatList=document.getElementById('chatList'),messages=document.getElementById('messages'),chatTitle=document.getElementById('chatTitle'),memberList=document.getElementById('memberList');
function getTopChats(){let inFolder=new Set(folders.flatMap(f=>f.chatIds));return chats.filter(c=>!inFolder.has(c.id))}
function tileHTML(c){return `<div class="tile" data-id="${c.id}"><div class="avatar" style="color:${c.color}">${c.icon}</div><div class="tileInfo"><div class="tileName">${c.name}</div><div class="tileSub">${c.members.length} участников</div></div><div class="unread">${c.unread||''}</div></div>`}
function renderList(){chatList.innerHTML='';getTopChats().forEach(c=>chatList.insertAdjacentHTML('beforeend',tileHTML(c)));folders.forEach(f=>{let el=document.createElement('div');el.className='folder'+(f.closed?' closed':'');el.dataset.folder=f.id;el.innerHTML=`<div class="folderHead"><div class="folderIcon" style="color:${f.color}">${f.icon}</div><div class="tileName">${f.name}</div><div class="folderArrow">${f.closed?'›':'⌄'}</div></div><div class="folderItems"></div>`;let items=el.querySelector('.folderItems');f.chatIds.map(id=>chats.find(c=>c.id===id)).filter(Boolean).forEach(c=>items.insertAdjacentHTML('beforeend',tileHTML(c)));chatList.appendChild(el)});bindTiles()}
function renderChat(){let c=chats.find(x=>x.id===active)||chats[0];active=c.id;c.unread=0;chatTitle.textContent='# '+c.name;messages.innerHTML='';c.msgs.forEach((m,i)=>addMsgDOM(m,i,false));memberList.innerHTML='';c.members.map(i=>membersData[i]).forEach(([n,r],i)=>memberList.insertAdjacentHTML('beforeend',`<div class="member"><div class="avatar">${n[0]}</div><div><b>${n}</b><div class="role">${r}</div></div></div>`));renderList()}
function addMsgDOM(m,i,anim=true){let div=document.createElement('div');div.className='msg '+(m[0]==='Director'?'me':'');div.dataset.i=i;let extra=m[3]==='file'?'<div class="file"><div class="pdf">PDF</div><div><b>report_q2.pdf</b><br><small>24 MB · удаление через 6 дней</small></div></div>':m[3]==='sticker'?'<div class="sticker">🛡️</div>':'';div.innerHTML=`<div class="avatar">${m[0][0]}</div><div class="bubble"><span class="author">${m[0]}</span><span class="time">${m[1]}</span><div class="text">${m[2]}</div>${extra}</div>`;div.addEventListener('contextmenu',e=>{e.preventDefault();startDelete(div)});messages.appendChild(div);if(anim)messages.scrollTop=messages.scrollHeight}
function bindTiles(){document.querySelectorAll('.tile').forEach(t=>{t.onclick=()=>{active=t.dataset.id;renderChat()};t.addEventListener('mousedown',startDrag)});document.querySelectorAll('.folderHead').forEach(h=>h.onclick=()=>{let f=folders.find(x=>x.id===h.parentElement.dataset.folder);f.closed=!f.closed;renderList()})}
function flip(fn){let els=[...document.querySelectorAll('.tile,.folder')];let first=new Map(els.map(e=>[e,e.getBoundingClientRect()]));fn();let newEls=[...document.querySelectorAll('.tile,.folder')];newEls.forEach(e=>{let f=first.get(e);if(!f)return;let l=e.getBoundingClientRect();let dx=f.left-l.left,dy=f.top-l.top;if(dx||dy){e.style.transition='none';e.style.transform=`translate(${dx}px,${dy}px)`;e.offsetHeight;e.style.transition='transform .22s cubic-bezier(.2,.8,.2,1)';e.style.transform='';setTimeout(()=>{e.style.transition='';},240)}})}
let drag=null;function startDrag(e){if(e.button!==0)return;let tile=e.currentTarget,id=tile.dataset.id,r=tile.getBoundingClientRect();drag={id,startX:e.clientX,startY:e.clientY,x:e.clientX-r.left,y:e.clientY-r.top,orig:r,tile,moved:false};document.addEventListener('mousemove',moveDrag);document.addEventListener('mouseup',endDrag)}
function moveDrag(e){if(!drag)return;let dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;if(!drag.moved&&Math.hypot(dx,dy)<4)return;if(!drag.moved){drag.moved=true;drag.tile.classList.add('drag-source');let g=drag.tile.cloneNode(true);g.classList.add('dragGhost');g.style.width=drag.orig.width+'px';document.body.appendChild(g);drag.ghost=g}drag.ghost.style.transform=`translate(${e.clientX-drag.x}px,${e.clientY-drag.y}px)`;let target=[...document.querySelectorAll('.tile:not(.drag-source)')].find(t=>{let r=t.getBoundingClientRect();return e.clientY>r.top&&e.clientY<r.bottom&&e.clientX>r.left&&e.clientX<r.right});if(target&&target.dataset.id!==drag.id){let from=chats.findIndex(c=>c.id===drag.id),to=chats.findIndex(c=>c.id===target.dataset.id);if(from>-1&&to>-1&&from!==to){flip(()=>{let [it]=chats.splice(from,1);chats.splice(to,0,it);renderList()})}}}
function endDrag(e){document.removeEventListener('mousemove',moveDrag);document.removeEventListener('mouseup',endDrag);if(!drag)return;let g=drag.ghost;if(!drag.moved){drag=null;return}let sourceId=drag.id;let finalTile=[...document.querySelectorAll('.tile')].find(t=>t.dataset.id===sourceId);let targetRect=finalTile?finalTile.getBoundingClientRect():drag.orig;g.style.transition='transform .22s cubic-bezier(.2,.8,.2,1),opacity .18s ease';g.style.transform=`translate(${targetRect.left}px,${targetRect.top}px)`;setTimeout(()=>{g.remove();document.querySelectorAll('.drag-source').forEach(x=>x.classList.remove('drag-source'))},230);drag=null}
function startDelete(el){if(deletePending)return;let c=chats.find(x=>x.id===active),idx=+el.dataset.i,sec=5;el.classList.add('deleting');document.getElementById('undo').classList.add('show');document.getElementById('undoText').textContent='Удаление через '+sec;deletePending={c,idx,el,t:setInterval(()=>{sec--;document.getElementById('undoText').textContent='Удаление через '+sec;if(sec<=0){clearInterval(deletePending.t);c.msgs.splice(idx,1);deletePending=null;document.getElementById('undo').classList.remove('show');renderChat()}},1000)}}
document.getElementById('undoBtn').onclick=()=>{if(!deletePending)return;clearInterval(deletePending.t);deletePending.el.classList.remove('deleting');deletePending=null;document.getElementById('undo').classList.remove('show')};
document.getElementById('composer').onsubmit=e=>{e.preventDefault();let v=msgInput.value.trim();if(!v)return;let c=chats.find(x=>x.id===active);c.msgs.push(['Director','сейчас',v]);msgInput.value='';renderChat()};
document.getElementById('membersBtn').onclick=()=>members.classList.toggle('closed');document.getElementById('closeMembers').onclick=()=>members.classList.add('closed');
document.getElementById('testUnread').onclick=()=>{let c=chats.find(x=>x.id!==active)||chats[0];c.unread=(c.unread||0)+1;renderList();let t=document.querySelector(`.tile[data-id="${c.id}"]`);if(t){t.classList.add('hasUnread','flash');setTimeout(()=>t.classList.remove('flash'),760)}};
searchBtn.onclick=()=>{searchWrap.classList.add('open');setTimeout(()=>searchInput.focus(),30)};searchInput.onblur=()=>{if(!searchInput.value)setTimeout(()=>searchWrap.classList.remove('open'),120)};searchInput.oninput=()=>{let q=searchInput.value.toLowerCase();document.querySelectorAll('.tile').forEach(t=>t.style.display=t.textContent.toLowerCase().includes(q)?'flex':'none')};
const colorVals=['#e12b32','#6c7cff','#3fd08c','#ff9d2e','#b56cff'],iconVals=['☂','◆','▣','●','⚙','✚'];let pickedColor=colorVals[0],pickedIcon=iconVals[0];function fillPickers(){colors.innerHTML=colorVals.map(c=>`<button class="swatch" data-c="${c}" style="background:${c}"></button>`).join('');icons.innerHTML=iconVals.map(i=>`<button class="iconPick" data-i="${i}">${i}</button>`).join('');colors.children[0].classList.add('sel');icons.children[0].classList.add('sel');[...colors.children].forEach(b=>b.onclick=e=>{e.preventDefault();pickedColor=b.dataset.c;[...colors.children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel')});[...icons.children].forEach(b=>b.onclick=e=>{e.preventDefault();pickedIcon=b.dataset.i;[...icons.children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel')})}
function openModal(){fillPickers();newName.value='';backdrop.classList.add('show');modal.classList.add('show');setTimeout(()=>newName.focus(),40)}function closeModal(){backdrop.classList.remove('show');modal.classList.remove('show')}newChatBtn.onclick=openModal;modalClose.onclick=closeModal;cancelModal.onclick=e=>{e.preventDefault();closeModal()};createChat.onclick=e=>{e.preventDefault();let name=newName.value.trim()||'Новый чат';let id='chat'+Date.now();chats.push({id,name,icon:pickedIcon,color:pickedColor,unread:0,members:[0],msgs:[['Director','сейчас','Чат создан.']]});active=id;closeModal();renderChat()};
renderList();renderChat();members.classList.add('closed');
</script>
</body>
</html>
