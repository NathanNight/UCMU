  <script>
    (()=>{function forceAuthInputSkin(){document.querySelectorAll('#auth input.auth-input,.auth input.auth-input').forEach(el=>{el.style.setProperty('appearance','none','important');el.style.setProperty('-webkit-appearance','none','important');el.style.setProperty('background','#1b1d20','important');el.style.setProperty('background-color','#1b1d20','important');el.style.setProperty('background-image','linear-gradient(180deg,#2b2e33,#17191d)','important');el.style.setProperty('color','#f4f7f6','important');el.style.setProperty('-webkit-text-fill-color','#f4f7f6','important');el.style.setProperty('border','1px solid rgba(255,255,255,.18)','important');el.style.setProperty('box-shadow','inset 0 1px 0 rgba(255,255,255,.08)','important');el.style.setProperty('caret-color','#ff5a5a','important')});document.querySelectorAll('#auth .pass-eye,.auth .pass-eye').forEach(btn=>{btn.style.setProperty('color','#fff','important');btn.style.setProperty('background','rgba(0,0,0,.45)','important');btn.style.setProperty('border','1px solid rgba(255,255,255,.28)','important');btn.style.setProperty('opacity','1','important')})}document.addEventListener('DOMContentLoaded',()=>{forceAuthInputSkin();setTimeout(forceAuthInputSkin,100);setTimeout(forceAuthInputSkin,500);setTimeout(forceAuthInputSkin,1500);setTimeout(forceAuthInputSkin,2500);document.addEventListener('input',forceAuthInputSkin,true);document.addEventListener('focusin',forceAuthInputSkin,true);new MutationObserver(forceAuthInputSkin).observe(document.body,{childList:true,subtree:true})})})();
