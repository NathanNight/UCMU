<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>U.C.M.U. Chat stitched v80 effects</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}
  iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#000}
</style>
</head>
<body>
<iframe id="shell" src="firebase-main-v79-stitched.html" title="U.C.M.U. Chat v80"></iframe>
<script>
(() => {
  const shell = document.getElementById('shell');

  function safeDoc(frame){try{return frame.contentDocument || frame.contentWindow.document}catch(e){return null}}
  function safeWin(frame){try{return frame.contentWindow}catch(e){return null}}

  function getChatDoc(){
    const shellDoc = safeDoc(shell);
    if(!shellDoc) return null;
    const chatFrame = shellDoc.getElementById('chatFrame');
    return chatFrame ? safeDoc(chatFrame) : null;
  }
  function getChatWin(){
    const shellDoc = safeDoc(shell);
    if(!shellDoc) return null;
    const chatFrame = shellDoc.getElementById('chatFrame');
    return chatFrame ? safeWin(chatFrame) : null;
  }

  function patchEffects(){
    const doc = getChatDoc();
    const win = getChatWin();
    if(!doc || !win || doc.__ucmuV80Effects) return;
    doc.__ucmuV80Effects = true;

    const style = doc.createElement('style');
    style.id = 'ucmuV80EffectsPatch';
    style.textContent = `
      /* compact white glow: visible, but not nuclear */
      .msg.added,
      .msg.ucmu-new-glow{
        animation:ucmuV80MsgIn .42s cubic-bezier(.18,1.1,.28,1) both, ucmuV80GlowSmall 1.65s ease-out both!important;
      }
      .msg.ucmu-new-glow .bubble,
      .msg.added .bubble{
        animation:ucmuV80BubbleGlowSmall 1.65s ease-out both!important;
      }
      @keyframes ucmuV80MsgIn{
        0%{opacity:0;filter:blur(9px);transform:translateY(10px) scale(.985)}
        68%{opacity:1;filter:blur(0);transform:translateY(-1px) scale(1.003)}
        100%{opacity:1;filter:blur(0);transform:none}
      }
      @keyframes ucmuV80GlowSmall{
        0%{filter:drop-shadow(0 0 8px rgba(255,255,255,.42))}
        100%{filter:drop-shadow(0 0 0 rgba(255,255,255,0))}
      }
      @keyframes ucmuV80BubbleGlowSmall{
        0%{box-shadow:0 0 0 1px rgba(255,255,255,.26),0 0 12px rgba(255,255,255,.20),0 10px 24px rgba(0,0,0,.18)}
        100%{box-shadow:0 0 0 1px rgba(255,255,255,0),0 0 0 rgba(255,255,255,0),0 10px 24px rgba(0,0,0,.18)}
      }

      /* closer to old v42 feeling: blur + soft fly + collapse */
      .msg.ucmu-v80-delete,
      .chat.ucmu-v80-delete{
        pointer-events:none!important;
        overflow:hidden!important;
        animation:ucmuV80Delete .46s cubic-bezier(.22,.9,.24,1) forwards!important;
        transform-origin:center!important;
      }
      @keyframes ucmuV80Delete{
        0%{opacity:1;filter:blur(0);transform:translateY(0) translateX(0) scale(1);max-height:120px}
        45%{opacity:.82;filter:blur(1.5px);transform:translateY(-2px) translateX(14px) scale(.985);max-height:120px}
        100%{opacity:0;filter:blur(9px);transform:translateY(-8px) translateX(42px) scale(.94);max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0}
      }
    `;
    doc.head.appendChild(style);

    let pendingDeleteTarget = null;

    function findDeleteTarget(ev){
      const ctx = doc.getElementById('ctx');
      const chatCtx = doc.getElementById('chatCtx');
      const selectedCtx = doc.getElementById('selectedCtx');
      const direct = ev.target.closest?.('.msg,.chat');
      if(direct) return direct;
      if(ctx && !ctx.classList.contains('hidden')){
        return doc.querySelector('.msg:hover,.msg.selected,.msg.active,.msg[data-context="1"]') || pendingDeleteTarget;
      }
      if(chatCtx && !chatCtx.classList.contains('hidden')){
        return doc.querySelector('.chat:hover,.chat.active') || pendingDeleteTarget;
      }
      if(selectedCtx && !selectedCtx.classList.contains('hidden')){
        return doc.querySelector('.msg.selected,.chat.selected') || pendingDeleteTarget;
      }
      return doc.querySelector('.msg:hover,.chat:hover,.chat.active') || pendingDeleteTarget;
    }

    doc.addEventListener('contextmenu', ev => {
      const t = ev.target.closest?.('.msg,.chat');
      if(t) pendingDeleteTarget = t;
    }, true);

    doc.addEventListener('pointerdown', ev => {
      const t = ev.target.closest?.('.msg,.chat');
      if(t) pendingDeleteTarget = t;
    }, true);

    doc.addEventListener('click', ev => {
      const btn = ev.target.closest?.('[data-a="delete"],.dangerPrimary,#confirmDelete,.chatAction.danger,.selectedAction.danger');
      if(!btn || btn.dataset.ucmuV80Pass === '1') return;
      const target = findDeleteTarget(ev);
      if(!target) return;

      ev.preventDefault();
      ev.stopPropagation();
      ev.stopImmediatePropagation();

      target.classList.remove('ucmu-removing');
      target.classList.add('ucmu-v80-delete');

      const ctxs = ['ctx','chatCtx','selectedCtx','deleteModal'];
      ctxs.forEach(id => doc.getElementById(id)?.classList.add('hidden'));

      win.setTimeout(() => {
        target.remove();
        pendingDeleteTarget = null;
      }, 470);
    }, true);

    // Any new message gets the smaller glow, then returns to normal.
    const feed = doc.getElementById('feed');
    if(feed){
      new win.MutationObserver(muts => {
        muts.forEach(m => Array.from(m.addedNodes).forEach(n => {
          if(n.nodeType !== 1) return;
          const items = n.classList?.contains('msg') ? [n] : Array.from(n.querySelectorAll?.('.msg') || []);
          items.forEach(el => {
            el.classList.remove('ucmu-new-glow');
            void el.offsetWidth;
            el.classList.add('ucmu-new-glow');
            win.setTimeout(() => el.classList.remove('ucmu-new-glow'), 1750);
          });
        }));
      }).observe(feed,{childList:true,subtree:false});
    }
  }

  shell.addEventListener('load', () => {
    const timer = setInterval(() => {
      patchEffects();
      const doc = getChatDoc();
      if(doc?.__ucmuV80Effects) clearInterval(timer);
    }, 300);
    setTimeout(() => clearInterval(timer), 12000);
  });
})();
</script>
</body>
</html>
