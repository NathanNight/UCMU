<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>U.C.M.U Chat</title><link rel="stylesheet" href="./screen.css?v=clean-5"></head><body><main id="app"><section class="screen"><div class="init" id="init"><div class="initText" id="initText"></div></div><div class="world" id="world"><div class="bg"><div class="wash"></div><div class="grid"></div><div class="scan"></div><div class="vig"></div></div><div class="hud"><div><span>U.C.M.U / CHANNEL</span><span>ACCESS NODE 07</span></div><i></i></div><section class="stage"><div class="logo"><img class="logoShine" src="../assets/logo.webp" alt=""><img src="../assets/logo.webp" alt="U.C.M.U"></div><div class="title"><div class="titleMain" id="titleMain"></div><div class="titleSub" id="titleSub"></div></div><div class="rings"><div class="ringsBase"><i class="baseRing b1"></i><i class="baseRing b2"></i><i class="baseRing b3"></i><i class="baseRing b4"></i></div><div class="ringsLive"><i class="ring r2"></i><i class="ring r3"></i><i class="ring r4"></i><b class="node n1"></b><b class="node n2"></b><b class="node n3"></b></div></div></section><section class="panel" id="panel"><div class="bar"><span>IDENTITY CHECK</span><i></i></div><div class="tabs"><button class="tab active" type="button" data-mode="login">Вход</button><button class="tab" type="button" data-mode="register">Регистрация</button></div><form class="form" id="form"><div class="fields" id="fields"></div><div class="error" id="error">ОЖИДАНИЕ ВВОДА.</div><button class="submit" id="submit" type="submit">ВОЙТИ</button></form></section></div></section></main><script type="module">import{authReady,loginWithEmail,registerWithEmail}from'./firebase.js';const sleep=m=>new Promise(r=>setTimeout(r,m));function fitApp(){const baseW=1180,baseH=820;const s=Math.min(innerWidth/baseW,innerHeight/baseH);document.documentElement.style.setProperty('--app-scale',Math.max(.62,s).toFixed(4))}addEventListener('resize',fitApp,{passive:true});fitApp();async function type(e,t,d){e.textContent='';e.classList.add('typing');for(const c of t){e.textContent+=c;await sleep(d)}e.classList.remove('typing')}async function blink(e){e.classList.add('blink','blinkText');await sleep(620);e.classList.remove('blink','blinkText')}async function tb(e,t,d){await type(e,t,d);await sleep(20);await blink(e)}async function ringsSeq(){world.classList.add('ringsOn');const s=['.r3','.n2','.r4','.n1','.r2','.n3'];for(const q of s){const e=document.querySelector(q);if(e)e.classList.add('show');await sleep(85+Math.random()*95)}}function authErrorText(error){const code=error?.code||error?.message||'';if(code.includes('FIREBASE_NOT_CONFIGURED'))return'FIREBASE НЕ НАСТРОЕН.';if(code.includes('auth/invalid-email'))return'НЕВЕРНЫЙ EMAIL.';if(code.includes('auth/user-not-found')||code.includes('auth/wrong-password')||code.includes('auth/invalid-credential'))return'НЕВЕРНЫЙ EMAIL ИЛИ ПАРОЛЬ.';if(code.includes('auth/email-already-in-use'))return'EMAIL УЖЕ ЗАНЯТ.';if(code.includes('auth/weak-password')||code.includes('WEAK_PASSWORD'))return'СЛАБЫЙ ПАРОЛЬ. МИНИМУМ 6 СИМВОЛОВ.';if(code.includes('PASSWORD_MISMATCH'))return'ПАРОЛИ НЕ СОВПАДАЮТ.';if(code.includes('USERNAME_REQUIRED'))return'НУЖЕН USERNAME.';if(code.includes('EMAIL_REQUIRED'))return'НУЖЕН EMAIL.';if(code.includes('INVITE_INVALID'))return'НЕВЕРНЫЙ INVITE CODE.';if(code.includes('INVITE_USED'))return'INVITE CODE УЖЕ ИСПОЛЬЗОВАН.';return'ОШИБКА ДОСТУПА.'}const panelHeights={login:244,register:362};const A={mode:'login',busy:false,sets:{login:[['email','email','Email','email',0,0],['password','password','Пароль','current-password',1,1]],register:[['username','text','@username','username',0,0],['email','email','Email','email',0,0],['password','password','Пароль','new-password',1,1],['passwordRepeat','password','Повтор пароля','new-password',1,0],['inviteCode','text','Invite code','off',0,0]]},init(){this.p=panel;this.f=fields;this.s=submit;this.e=error;document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>this.set(b.dataset.mode));form.onsubmit=x=>this.submit(x);this.render();this.p.style.setProperty('--panel-h',panelHeights[this.mode]+'px');this.setStatus(authReady()?'ОЖИДАНИЕ ВВОДА.':'FIREBASE НЕ НАСТРОЕН.',!authReady())},values(){const data={};this.f.querySelectorAll('input').forEach(i=>data[i.placeholder=== '@username'?'username':i.autocomplete==='off'?'inviteCode':i.type==='email'?'email':i.placeholder==='Повтор пароля'?'passwordRepeat':'password']=i.value);return data},async submit(x){x.preventDefault();if(this.busy)return;this.busy=true;this.setStatus(this.mode==='register'?'РЕГИСТРАЦИЯ...':'АВТОРИЗАЦИЯ...');try{const data=this.values();const user=this.mode==='register'?await registerWithEmail(data):await loginWithEmail(data);this.setStatus('ДОСТУП РАЗРЕШЁН: '+(user.displayName||user.email||user.uid));}catch(error){this.setStatus(authErrorText(error),true)}finally{this.busy=false}},setStatus(t,bad=false){this.e.textContent=t;this.p.classList.toggle('bad',bad);if(bad){clearTimeout(this.errTimer);this.errTimer=setTimeout(()=>this.p.classList.remove('bad'),760)}},async set(m){if(this.busy||this.mode===m)return;this.busy=true;this.p.classList.add('switching');await sleep(120);this.mode=m;this.render();this.setStatus(authReady()?'ОЖИДАНИЕ ВВОДА.':'FIREBASE НЕ НАСТРОЕН.',!authReady());this.p.style.setProperty('--panel-h',panelHeights[this.mode]+'px');requestAnimationFrame(()=>this.p.classList.remove('switching'));await sleep(520);this.busy=false},render(){this.s.textContent=this.mode==='register'?'ЗАРЕГИСТРИРОВАТЬСЯ':'ВОЙТИ';document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===this.mode));let h='';this.sets[this.mode].forEach(a=>{h+='<label class="field '+(a[4]?'password':'')+'"><input class="input" data-pass="'+a[4]+'" type="'+a[1]+'" placeholder="'+a[2]+'" autocomplete="'+a[3]+'">'+(a[5]?'<button class="eye" type="button">◉</button>':'')+'</label>'});this.f.innerHTML=h;this.f.querySelectorAll('.eye').forEach(b=>b.onclick=()=>{const q=[...this.f.querySelectorAll('[data-pass="1"]')],show=q.some(i=>i.type==='password');q.forEach(i=>i.type=show?'text':'password')})}};async function boot(){A.init();await sleep(120);await type(initText,'INIT SYSTEM',30);await sleep(80);await blink(initText);await sleep(80);init.classList.add('done');world.classList.add('show');await sleep(220);world.classList.add('logoOn');await sleep(360);world.classList.add('logoGlowOn');world.classList.add('active');await sleep(140);world.classList.add('gridOn');world.classList.add('hudOn');await sleep(180);await ringsSeq();await sleep(120);world.classList.add('titleOn');tb(titleMain,'CHAT',28);await sleep(70);tb(titleSub,'SECURE COMMUNICATIONS',10);await sleep(220);world.classList.add('formOn')}boot();</script></body></html>
