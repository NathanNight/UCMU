<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#020303">
  <title>U.C.M.U Chat</title>
  <style>
    html,body,#app{width:100%;height:100%;margin:0;background:#020303;color:#f4f7f6;overflow:hidden}
    body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
  </style>
  <link rel="stylesheet" href="./styles.css?v=cinematic-classified-1">
</head>
<body>
  <main id="app" class="ucmu-app">
    <section class="classified" data-screen>
      <div class="init-gate" data-init>
        <div class="init-gate__text" data-init-text></div>
      </div>

      <div class="classified__world" data-world>
        <div class="bg" aria-hidden="true">
          <div class="bg__wash"></div>
          <div class="bg__grid"></div>
          <div class="bg__noise"></div>
          <div class="bg__scan"></div>
        </div>

        <div class="hud hud--top" aria-hidden="true">
          <span>U.C.M.U / BLACK CHANNEL</span>
          <i></i>
          <span>ACCESS NODE 07</span>
        </div>

        <div class="hud hud--left" aria-hidden="true">
          <span>AUTH</span><span>BIOMETRIC</span><span>LINK</span><span>READY</span>
        </div>

        <div class="hud hud--right" aria-hidden="true">
          <span>TRACE 00</span><span>FIRESTORE</span><span>SECURE</span>
        </div>

        <section class="core">
          <div class="core__logo" data-logo>
            <div class="core__logo-aura"></div>
            <img src="../assets/logo.webp" alt="U.C.M.U">
          </div>

          <div class="core__rings" aria-hidden="true">
            <i class="ring ring--1"></i>
            <i class="ring ring--2"></i>
            <i class="ring ring--3"></i>
            <i class="ring ring--4"></i>
            <b class="node node--1"></b>
            <b class="node node--2"></b>
            <b class="node node--3"></b>
          </div>

          <div class="core__title">
            <div class="core__title-main" data-title-main></div>
            <div class="core__title-sub" data-title-sub></div>
          </div>
        </section>

        <section class="auth-panel" data-auth>
          <div class="auth-panel__bar">
            <span>IDENTITY CHECK</span>
            <i></i>
          </div>

          <div class="auth-tabs">
            <button class="auth-tabs__btn is-active" type="button" data-auth-mode="login">Вход</button>
            <button class="auth-tabs__btn" type="button" data-auth-mode="register">Регистрация</button>
          </div>

          <form class="auth-form" data-auth-form>
            <div class="auth-form__fields" data-auth-fields></div>
            <div class="auth-form__error" data-auth-error></div>
            <button class="auth-form__submit" type="submit" data-auth-submit>ВОЙТИ</button>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="./app.js?v=cinematic-classified-1"></script>
</body>
</html>
