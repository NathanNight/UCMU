<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020303">
  <title>U.C.M.U App Boot</title>
  <style>
    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020303;
      color: #eef4f2;
    }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app-shell, .boot {
      width: 100vw;
      height: 100vh;
      background: #020303;
    }
    .boot {
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .boot__center {
      opacity: 0;
    }
    .boot__terminal {
      position: absolute;
      left: clamp(18px, 6vw, 72px);
      top: clamp(18px, 7vh, 68px);
      color: #eef4f2;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: clamp(16px, 3.8vw, 28px);
      letter-spacing: 0.11em;
    }
  </style>
  <link rel="stylesheet" href="./styles.css?v=boot-20260502-2">
</head>
<body>
  <main id="app" class="app-shell">
    <section class="boot" data-boot>
      <div class="boot__noise" aria-hidden="true"></div>
      <div class="boot__grid" aria-hidden="true"></div>
      <div class="boot__glow" aria-hidden="true"></div>

      <div class="boot__center">
        <div class="boot__rings" aria-hidden="true">
          <span class="boot__ring boot__ring--outer"></span>
          <span class="boot__ring boot__ring--middle"></span>
          <span class="boot__ring boot__ring--inner"></span>
        </div>

        <div class="boot__rays" aria-hidden="true">
          <span class="boot__ray boot__ray--a"></span>
          <span class="boot__ray boot__ray--b"></span>
          <span class="boot__ray boot__ray--c"></span>
          <span class="boot__ray boot__ray--d"></span>
        </div>

        <div class="boot__logo" aria-label="U.C.M.U">
          <span class="boot__logo-main">U.C.M.U</span>
          <span class="boot__logo-sub">MEDIA UNIT</span>
        </div>
      </div>

      <div class="boot__terminal" aria-live="polite">
        <div class="boot__terminal-line" data-boot-line></div>
      </div>
    </section>
  </main>

  <script type="module" src="./app.js?v=boot-20260502-2"></script>
</body>
</html>
