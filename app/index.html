<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>U.C.M.U Chat</title><link rel="stylesheet" href="./screen.css?v=2"><link rel="stylesheet" href="./polish.css?v=2"></head><body><main id="app"><section class="screen"><div class="init" id="init"><div class="initText" id="initText"></div></div><div class="world" id="world"><div class="bg"><div class="wash"></div><div class="grid"></div><div class="scan"></div><div class="vig"></div></div><div class="hud"><div><span>U.C.M.U / CHANNEL</span><span>ACCESS NODE 07</span></div><i></i></div><section class="stage"><div class="logo"><img class="logoShine" src="../assets/logo.webp" alt=""><img src="../assets/logo.webp" alt="U.C.M.U"></div><div class="title"><div class="titleMain" id="titleMain"></div><div class="titleSub" id="titleSub"></div></div><div class="rings"><div class="ringsBase"><i class="baseRing b1"></i><i class="baseRing b2"></i><i class="baseRing b3"></i></div><i class="ring r1"></i><i class="ring r2"></i><i class="ring r3"></i><i class="ring r4"></i><b class="node n1"></b><b class="node n2"></b><b class="node n3"></b></div></section><section class="panel" id="panel"><div class="bar"><span>IDENTITY CHECK</span><i></i></div><div class="tabs"><button class="tab active" type="button" data-mode="login">Вход</button><button class="tab" type="button" data-mode="register">Регистрация</button></div><form class="form" id="form"><div class="fields" id="fields"></div><div class="error" id="error"></div><button class="submit" id="submit" type="submit">ВОЙТИ</button></form></section></div></section></main><script>const sleep=m=>new Promise(r=>setTimeout(r,m));async function type(e,t,d){e.textContent='';e.classList.add('typing');for(const c of t){e.textContent+=c;await sleep(d)}e.classList.remove('typing')}async function blink(e){e.classList.add('blink','blinkText');await sleep(620);e.classList.remove('blink','blinkText')}async function tb(e,t,d){await type(e,t,d);await sleep(20);await blink(e)}async function ringsSeq(){world.classList.add('ringsOn');const s=['.r3','.n2','.r1','.r4','.n1','.r2','.n3'];for(const q of s){const e=document.querySelector(q);if(e)e.classList.add('show');await sleep(70+Math.random()*110)}}const A={mode:'login',busy:false,sets:{login:[['email','email','Email','email',0,0],['password','password','Пароль','current-password',1,1]],register:[['username','text','@username','username',0,0],['email','email','Email','email',0,0],['password','password','Пароль','new-password',1,1],['passwordRepeat','password','Повтор пароля','new-password',1,0],['inviteCode','text','Invite code','off',0,0]]},init(){this.p=panel;this.f=fields;this.s=submit;this.e=error;document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>this.set(b.dataset.mode));form.onsubmit=x=>{x.preventDefault();this.e.textContent='Подключение следующим шагом.'};this.render();this.fit()},async set(m){if(this.busy||this.mode===m)return;this.busy=true;this.p.style.height=this.p.getBoundingClientRect().height+'px';this.mode=m;this.p.classList.add('switching');this.render();requestAnimationFrame(()=>this.fit());await sleep(135);this.p.classList.remove('switching');this.busy=false},fit(){this.p.style.height='auto';const h=this.p.scrollHeight;this.p.style.height=h+'px'},render(){this.s.textContent=this.mode==='register'?'ЗАРЕГИСТРИРОВАТЬСЯ':'ВОЙТИ';this.e.textContent='';document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===this.mode));let h='';this.sets[this.mode].forEach(a=>{h+='<label class="field '+(a[4]?'password':'')+'"><input class="input" data-pass="'+a[4]+'" type="'+a[1]+'" placeholder="'+a[2]+'" autocomplete="'+a[3]+'">'+(a[5]?'<button class="eye" type="button">◉</button>':'')+'</label>'});this.f.innerHTML=h;this.f.querySelectorAll('.eye').forEach(b=>b.onclick=()=>{const q=[...this.f.querySelectorAll('[data-pass="1"]')],show=q.some(i=>i.type==='password');q.forEach(i=>i.type=show?'text':'password')})}};async function boot(){A.init();await sleep(100);await type(initText,'INIT SYSTEM',28);await sleep(55);await blink(initText);await sleep(30);init.classList.add('done');world.classList.add('show');await sleep(140);world.classList.add('active');await sleep(220);world.classList.add('gridOn');await sleep(220);world.classList.add('hudOn');await sleep(300);world.classList.add('logoOn');await sleep(360);await ringsSeq();await sleep(140);tb(titleMain,'CHAT',24);await sleep(60);tb(titleSub,'SECURE COMMUNICATIONS',8);await sleep(260);world.classList.add('titleOn');await sleep(340);world.classList.add('formOn')}boot();</script></body></html>
