<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>U.C.M.U. Chat stitched v75</title>
<style>
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:#f4f7f6;
    font-family:Arial,Helvetica,sans-serif;
  }
  .ucmu-frame{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:#000;
  }
  #chatFrame{
    opacity:0;
    pointer-events:none;
    transition:opacity .42s ease;
  }
  #authFrame{
    opacity:1;
    pointer-events:auto;
    transition:opacity .42s ease,filter .42s ease,transform .42s ease;
  }
  body.chat-open #chatFrame{
    opacity:1;
    pointer-events:auto;
  }
  body.chat-open #authFrame{
    opacity:0;
    pointer-events:none;
    filter:blur(10px);
    transform:scale(1.012);
  }
  .fallback-enter{
    position:fixed;
    left:50%;
    bottom:22px;
    z-index:20;
    transform:translateX(-50%);
    height:42px;
    padding:0 18px;
    border:1px solid rgba(255,85,85,.55);
    background:linear-gradient(135deg,#b8171d,#4f0708);
    color:#fff;
    font-weight:900;
    letter-spacing:.08em;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  body.auth-ready:not(.chat-open) .fallback-enter{
    opacity:.92;
    pointer-events:auto;
  }
</style>
</head>
<body>
  <iframe id="authFrame" class="ucmu-frame" src="firebase-main-v63.html" title="U.C.M.U. start screen"></iframe>
  <iframe id="chatFrame" class="ucmu-frame" src="firebase-main-v42.html" title="U.C.M.U. chat"></iframe>
  <button id="fallbackEnter" class="fallback-enter">ОТКРЫТЬ ЧАТ</button>

<script>
(() => {
  const authFrame = document.getElementById('authFrame');
  const chatFrame = document.getElementById('chatFrame');
  const fallbackEnter = document.getElementById('fallbackEnter');
  let opened = false;

  function safeDoc(frame){
    try { return frame.contentDocument || frame.contentWindow.document; }
    catch(e){ return null; }
  }

  function openChat(){
    if(opened) return;
    opened = true;
    document.body.classList.add('chat-open');
    unlockChatFrame();
  }

  function unlockChatFrame(){
    const doc = safeDoc(chatFrame);
    if(!doc) return;

    // У v42 оставляем сам чат и функции, но убираем его старый login-screen.
    if(!doc.getElementById('ucmuStitchPatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuStitchPatch';
      style.textContent = `
        .login{display:none!important;opacity:0!important;pointer-events:none!important}
        body{overflow:hidden!important}
      `;
      doc.head.appendChild(style);
    }

    const login = doc.getElementById('login');
    if(login) login.classList.add('off');
  }

  function patchAuthFrame(){
    const doc = safeDoc(authFrame);
    if(!doc) return;

    document.body.classList.add('auth-ready');

    // В v63 оставляем только старт/auth экран. Всё, что за ним, принудительно выключаем.
    if(!doc.getElementById('ucmuAuthOnlyPatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuAuthOnlyPatch';
      style.textContent = `
        .app,.modal{display:none!important;opacity:0!important;pointer-events:none!important}
        .auth{display:grid!important}
        html,body{overflow:hidden!important;background:#000!important}
      `;
      doc.head.appendChild(style);
    }

    const buttons = Array.from(doc.querySelectorAll('button'));
    buttons.forEach(btn => {
      const text = (btn.textContent || '').trim().toUpperCase();
      if(text.includes('ВОЙТИ')){
        btn.addEventListener('click', () => setTimeout(openChat, 260), { once:false });
      }
    });

    // На случай если v63 сам поставит auth.hidden/app.active — ловим и переключаемся на v42.
    const observer = new MutationObserver(() => {
      const auth = doc.querySelector('.auth');
      const app = doc.querySelector('.app');
      if((auth && auth.classList.contains('hidden')) || (app && app.classList.contains('active'))){
        openChat();
      }
    });
    observer.observe(doc.documentElement, { attributes:true, subtree:true, attributeFilter:['class'] });
  }

  authFrame.addEventListener('load', patchAuthFrame);
  chatFrame.addEventListener('load', unlockChatFrame);
  fallbackEnter.addEventListener('click', openChat);

  // Доп. страховка, если iframe уже загрузился раньше обработчика.
  setTimeout(patchAuthFrame, 500);
  setTimeout(unlockChatFrame, 500);
})();
</script>
</body>
</html>
