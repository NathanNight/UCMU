<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>U.C.M.U. Chat stitched v76</title>
<style>
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:#f4f7f6;
    font-family:Arial,Helvetica,sans-serif;
  }
  .ucmu-frame{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:#000;
  }
  #chatFrame{
    opacity:0;
    pointer-events:none;
    transition:opacity .42s ease;
  }
  #authFrame{
    opacity:1;
    pointer-events:auto;
    transition:opacity .42s ease,filter .42s ease,transform .42s ease;
  }
  body.chat-open #chatFrame{
    opacity:1;
    pointer-events:auto;
  }
  body.chat-open #authFrame{
    opacity:0;
    pointer-events:none;
    filter:blur(10px);
    transform:scale(1.012);
  }
  .fallback-enter{
    position:fixed;
    left:50%;
    bottom:22px;
    z-index:20;
    transform:translateX(-50%);
    height:42px;
    padding:0 18px;
    border:1px solid rgba(255,85,85,.55);
    background:linear-gradient(135deg,#b8171d,#4f0708);
    color:#fff;
    font-weight:900;
    letter-spacing:.08em;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  body.auth-ready:not(.chat-open) .fallback-enter{
    opacity:.92;
    pointer-events:auto;
  }
</style>
</head>
<body>
  <iframe id="authFrame" class="ucmu-frame" src="firebase-main-v63.html" title="U.C.M.U. start screen"></iframe>
  <iframe id="chatFrame" class="ucmu-frame" src="firebase-main-v42.html" title="U.C.M.U. chat"></iframe>
  <button id="fallbackEnter" class="fallback-enter">ОТКРЫТЬ ЧАТ</button>

<script>
(() => {
  const authFrame = document.getElementById('authFrame');
  const chatFrame = document.getElementById('chatFrame');
  const fallbackEnter = document.getElementById('fallbackEnter');
  let opened = false;

  function safeDoc(frame){
    try { return frame.contentDocument || frame.contentWindow.document; }
    catch(e){ return null; }
  }

  function openChat(){
    if(opened) return;
    opened = true;
    document.body.classList.add('chat-open');
    unlockChatFrame();
  }

  function unlockChatFrame(){
    const doc = safeDoc(chatFrame);
    if(!doc) return;

    if(!doc.getElementById('ucmuStitchPatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuStitchPatch';
      style.textContent = `
        .login{display:none!important;opacity:0!important;pointer-events:none!important}
        body{overflow:hidden!important}
      `;
      doc.head.appendChild(style);
    }

    const login = doc.getElementById('login');
    if(login) login.classList.add('off');

    patchChatFrame();
  }

  function patchChatFrame(){
    const doc = safeDoc(chatFrame);
    if(!doc || doc.__ucmuV76Patched) return;
    doc.__ucmuV76Patched = true;
    const win = chatFrame.contentWindow;

    const style = doc.createElement('style');
    style.id = 'ucmuV76ChatFixes';
    style.textContent = `
      .feed{scroll-behavior:smooth!important;overflow-anchor:none!important}
      #chatList.ucmu-stable .chat,
      #folders.ucmu-stable .chat,
      #folders.ucmu-stable [class*="folder"],
      #chatList.ucmu-stable [class*="chat"]{
        animation:none!important;
      }
      #chatList .chat,
      #folders .chat,
      #folders [class*="folder"],
      #chatList [class*="chat"]{
        transition:transform .22s ease, top .22s ease, margin .22s ease, background .18s ease, border-color .18s ease, opacity .18s ease!important;
      }
      .msg.added{
        animation:ucmuMsgSoftIn .22s ease both!important;
      }
      @keyframes ucmuMsgSoftIn{
        from{opacity:0;transform:translateY(8px)}
        to{opacity:1;transform:none}
      }
    `;
    doc.head.appendChild(style);

    win.setTimeout(() => {
      const chatList = doc.getElementById('chatList');
      const folders = doc.getElementById('folders');
      if(chatList) chatList.classList.add('ucmu-stable');
      if(folders) folders.classList.add('ucmu-stable');
    }, 900);

    const feed = doc.getElementById('feed');
    if(feed){
      let scrollTimer = 0;
      const softScrollBottom = () => {
        win.clearTimeout(scrollTimer);
        scrollTimer = win.setTimeout(() => {
          const last = feed.querySelector('.msg:last-of-type');
          if(last && last.scrollIntoView){
            last.scrollIntoView({behavior:'smooth', block:'end', inline:'nearest'});
          }else{
            feed.scrollTo({top:feed.scrollHeight, behavior:'smooth'});
          }
        }, 32);
      };
      new win.MutationObserver(muts => {
        if(muts.some(m => Array.from(m.addedNodes).some(n => n.nodeType === 1 && (n.classList?.contains('msg') || n.querySelector?.('.msg'))))){
          softScrollBottom();
        }
      }).observe(feed, {childList:true, subtree:false});
    }

    function closestFolder(el){
      if(!el || !el.closest) return null;
      const folder = el.closest('[data-folder-id],.folderItem,.folder-item,.folderRow,.folder-row,.folderCard,.folder-card,.folder');
      if(!folder) return null;
      if(folder.id === 'folderBtn' || folder.id === 'folderModal' || folder.closest('#folderModal,#folderStyleModal,#folderCtx')) return null;
      return folder;
    }

    function isOpenFolder(folder){
      if(!folder) return false;
      const cls = folder.className || '';
      if(/\b(open|opened|expanded|active|is-open|folderOpen|folder-open)\b/i.test(cls)) return true;
      if(folder.getAttribute('aria-expanded') === 'true') return true;
      if(folder.querySelector('.folderChats:not(.hidden),.folderContent:not(.hidden),.folder-content:not(.hidden),.folderBody:not(.hidden),.folder-body:not(.hidden),.folderList:not(.hidden),.folder-list:not(.hidden)')) return true;
      return false;
    }

    // Закрытая папка больше не раскрывается от простого hover во время drag.
    // Drop при этом остаётся рабочим: карточка улетает в закрытую папку как раньше.
    ['dragenter','dragover'].forEach(type => {
      doc.addEventListener(type, ev => {
        const folder = closestFolder(ev.target);
        if(!folder || isOpenFolder(folder)) return;
        if(type === 'dragover') ev.preventDefault();
        ev.stopImmediatePropagation();
      }, true);
    });
  }

  function patchAuthFrame(){
    const doc = safeDoc(authFrame);
    if(!doc) return;

    document.body.classList.add('auth-ready');

    if(!doc.getElementById('ucmuAuthOnlyPatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuAuthOnlyPatch';
      style.textContent = `
        .app,.modal{display:none!important;opacity:0!important;pointer-events:none!important}
        .auth{display:grid!important}
        html,body{overflow:hidden!important;background:#000!important}
      `;
      doc.head.appendChild(style);
    }

    const buttons = Array.from(doc.querySelectorAll('button'));
    buttons.forEach(btn => {
      const text = (btn.textContent || '').trim().toUpperCase();
      if(text.includes('ВОЙТИ')){
        btn.addEventListener('click', () => setTimeout(openChat, 260), { once:false });
      }
    });

    const observer = new MutationObserver(() => {
      const auth = doc.querySelector('.auth');
      const app = doc.querySelector('.app');
      if((auth && auth.classList.contains('hidden')) || (app && app.classList.contains('active'))){
        openChat();
      }
    });
    observer.observe(doc.documentElement, { attributes:true, subtree:true, attributeFilter:['class'] });
  }

  authFrame.addEventListener('load', patchAuthFrame);
  chatFrame.addEventListener('load', unlockChatFrame);
  fallbackEnter.addEventListener('click', openChat);

  setTimeout(patchAuthFrame, 500);
  setTimeout(unlockChatFrame, 500);
})();
</script>
</body>
</html>
