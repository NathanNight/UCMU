<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>U.C.M.U. Chat stitched v92 global animations</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#f4f7f6;font-family:Arial,Helvetica,sans-serif}
  .ucmu-frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;background:#000}
  #chatFrame{opacity:0;pointer-events:none;transition:opacity .42s ease}
  #authFrame{opacity:1;pointer-events:auto;transition:opacity .42s ease,filter .42s ease,transform .42s ease}
  body.chat-open #chatFrame{opacity:1;pointer-events:auto}
  body.chat-open #authFrame{opacity:0;pointer-events:none;filter:blur(10px);transform:scale(1.012)}
</style>
</head>
<body>
  <iframe id="authFrame" class="ucmu-frame" src="firebase-main-v63.html" title="U.C.M.U. start screen"></iframe>
  <iframe id="chatFrame" class="ucmu-frame" src="firebase-main-v42.html?v=89" title="U.C.M.U. chat"></iframe>
<script>
(() => {
  const authFrame = document.getElementById('authFrame');
  const chatFrame = document.getElementById('chatFrame');
  let opened = false;

  function safeDoc(frame){
    try { return frame.contentDocument || frame.contentWindow.document; }
    catch(e){ return null; }
  }

  function openChat(){
    if(opened) return;
    opened = true;
    document.body.classList.add('chat-open');
    patchChatFrame();
  }

  function patchChatFrame(){
    const doc = safeDoc(chatFrame);
    if(!doc) return;

    if(!doc.getElementById('ucmuV92BasePatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuV92BasePatch';
      style.textContent = `
        .login{display:none!important;opacity:0!important;pointer-events:none!important}
        body{overflow:hidden!important}
        .feed{
          scroll-behavior:smooth!important;
          overflow-anchor:none!important;
          padding-bottom:145px!important;
        }
        #chatList.ucmu-stable .chat,
        #folders.ucmu-stable .chat,
        #folders.ucmu-stable [class*="folder"],
        #chatList.ucmu-stable [class*="chat"]{animation:none!important}
        .msg.ucmu-msg-in,
        .ucmu-anim-enter{
          animation:ucmuMsgIn .34s cubic-bezier(.18,1.1,.28,1) both!important;
        }
        .msg.ucmu-msg-in .bubble,
        .ucmu-anim-enter .bubble{
          animation:ucmuMsgGlow .9s ease-out both!important;
        }
        .ucmu-anim-remove{
          pointer-events:none!important;
          overflow:hidden!important;
          animation:ucmuAnimRemove .42s cubic-bezier(.22,.9,.24,1) forwards!important;
        }
        @keyframes ucmuMsgIn{
          0%{opacity:0;filter:blur(7px);transform:translateY(10px) scale(.985)}
          70%{opacity:1;filter:blur(0);transform:translateY(-1px) scale(1.002)}
          100%{opacity:1;filter:blur(0);transform:none}
        }
        @keyframes ucmuMsgGlow{
          0%{box-shadow:0 0 0 1px rgba(255,255,255,.16),0 0 8px rgba(255,255,255,.10),0 10px 24px rgba(0,0,0,.18)}
          100%{box-shadow:0 0 0 1px rgba(255,255,255,0),0 0 0 rgba(255,255,255,0),0 10px 24px rgba(0,0,0,.18)}
        }
        @keyframes ucmuAnimRemove{
          0%{opacity:1;filter:blur(0);transform:translateY(0) scale(1);max-height:170px}
          45%{opacity:.72;filter:blur(1px);transform:translateY(8px) scale(.985);max-height:170px}
          100%{opacity:0;filter:blur(7px);transform:translateY(22px) scale(.94);max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0}
        }
      `;
      doc.head.appendChild(style);
    }

    doc.getElementById('login')?.classList.add('off');
    installUCMUAnim(doc, chatFrame.contentWindow);
    installGlobalAnimationHooks(doc, chatFrame.contentWindow);
    patchSmoothSend(doc, chatFrame.contentWindow);

    chatFrame.contentWindow.setTimeout(() => {
      doc.getElementById('chatList')?.classList.add('ucmu-stable');
      doc.getElementById('folders')?.classList.add('ucmu-stable');
    }, 700);
  }

  function installUCMUAnim(doc, win){
    if(win.UCMUAnim) return;
    win.UCMUAnim = {
      appear(el){
        if(!el || el.__ucmuRemoving) return;
        el.classList.remove('ucmu-anim-enter');
        void el.offsetWidth;
        el.classList.add('ucmu-anim-enter');
        win.setTimeout(() => el.classList.remove('ucmu-anim-enter'), 520);
      },
      remove(el, done){
        if(!el) return;
        if(el.__ucmuRemoving) return;
        el.__ucmuRemoving = true;
        el.classList.remove('ucmu-anim-enter');
        el.classList.remove('ucmu-anim-remove');
        void el.offsetWidth;
        el.classList.add('ucmu-anim-remove');
        win.setTimeout(() => {
          if(typeof done === 'function') done(el);
          else el.remove();
        }, 430);
      }
    };
  }

  function installGlobalAnimationHooks(doc, win){
    if(doc.__ucmuV92GlobalAnimPatched) return;
    doc.__ucmuV92GlobalAnimPatched = true;

    const folderSelector = '#folders [data-folder-id], #folders .folderItem, #folders .folder-item, #folders .folderRow, #folders .folder-row, #folders .folderCard, #folders .folder-card, #folders .folder, #folders details';
    const animSelector = `.msg, .chat, ${folderSelector}`;

    function isAnimTarget(node){
      if(!node || node.nodeType !== 1 || !node.matches) return false;
      if(node.closest?.('.login,#ctx,#chatCtx,#folderCtx,#deleteModal,#selectedCtx,.ucmuUndoToast')) return false;
      return node.matches(animSelector);
    }

    function collectAnimTargets(node){
      if(!node || node.nodeType !== 1) return [];
      const list = [];
      if(isAnimTarget(node)) list.push(node);
      node.querySelectorAll?.(animSelector).forEach(el => {
        if(isAnimTarget(el)) list.push(el);
      });
      return list;
    }

    let observeAdds = false;
    win.setTimeout(() => { observeAdds = true; }, 950);

    const observer = new win.MutationObserver(muts => {
      if(!observeAdds) return;
      muts.forEach(m => {
        m.addedNodes.forEach(n => {
          collectAnimTargets(n).forEach(el => {
            if(el.__ucmuSeen || el.__ucmuRemoving) return;
            el.__ucmuSeen = true;
            win.UCMUAnim?.appear(el);
          });
        });
      });
    });
    observer.observe(doc.body, { childList:true, subtree:true });

    const nativeRemove = win.Element.prototype.remove;
    const nativeRemoveChild = win.Node.prototype.removeChild;

    if(!win.Element.prototype.__ucmuV92RemovePatched){
      win.Element.prototype.__ucmuV92RemovePatched = true;
      win.Element.prototype.remove = function(){
        const el = this;
        if(isAnimTarget(el) && !el.__ucmuNativeRemoving && !el.__ucmuRemoving){
          win.UCMUAnim?.remove(el, target => {
            target.__ucmuNativeRemoving = true;
            nativeRemove.call(target);
          });
          return;
        }
        return nativeRemove.call(el);
      };
    }

    if(!win.Node.prototype.__ucmuV92RemoveChildPatched){
      win.Node.prototype.__ucmuV92RemoveChildPatched = true;
      win.Node.prototype.removeChild = function(child){
        if(isAnimTarget(child) && !child.__ucmuNativeRemoving && !child.__ucmuRemoving){
          const parent = this;
          win.UCMUAnim?.remove(child, target => {
            target.__ucmuNativeRemoving = true;
            if(target.parentNode === parent){
              nativeRemoveChild.call(parent, target);
            }else if(target.parentNode){
              nativeRemoveChild.call(target.parentNode, target);
            }
          });
          return child;
        }
        return nativeRemoveChild.call(this, child);
      };
    }
  }

  function patchSmoothSend(doc, win){
    if(doc.__ucmuV92SendPatched) return;
    doc.__ucmuV92SendPatched = true;

    const input = doc.getElementById('input') || doc.querySelector('.msginput, textarea, .compose input');
    const send = doc.getElementById('send') || doc.querySelector('.send');
    const feed = doc.getElementById('feed');
    if(!input || !send || !feed) return;

    let lock = false;

    function scrollWithSpace(){
      win.requestAnimationFrame(() => {
        feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
      });
    }

    function addOneMessage(text){
      const stamp = Date.now().toString(36);
      feed.insertAdjacentHTML('beforeend', `
        <article class="msg ucmu-msg-in" data-ucmu-v92-msg="${stamp}">
          <div class="ava s"></div>
          <div class="bubble">
            <div class="meta"><span class="red">Director</span><span class="time">сейчас</span></div>
            <div class="txt"></div>
          </div>
        </article>`);
      const item = feed.querySelector(`[data-ucmu-v92-msg="${stamp}"]`);
      const node = item?.querySelector('.txt');
      if(node) node.textContent = text;
      if(item) item.__ucmuSeen = true;
      win.UCMUAnim?.appear(item);
      scrollWithSpace();
    }

    function safeSend(ev){
      if(ev){
        ev.preventDefault();
        ev.stopPropagation();
        ev.stopImmediatePropagation();
      }
      if(lock) return;
      const text = (input.value || '').trim();
      if(!text) return;
      lock = true;
      addOneMessage(text);
      input.value = '';
      input.dispatchEvent(new win.Event('input', {bubbles:true}));
      win.setTimeout(() => { lock = false; }, 120);
    }

    send.addEventListener('click', safeSend, true);
    input.addEventListener('keydown', ev => {
      if(ev.key === 'Enter' && !ev.shiftKey) safeSend(ev);
    }, true);
  }

  function patchAuthFrame(){
    const doc = safeDoc(authFrame);
    if(!doc) return;

    if(!doc.getElementById('ucmuAuthOnlyPatch')){
      const style = doc.createElement('style');
      style.id = 'ucmuAuthOnlyPatch';
      style.textContent = `
        .app,.modal{display:none!important;opacity:0!important;pointer-events:none!important}
        .auth{display:grid!important}
        html,body{overflow:hidden!important;background:#000!important}
      `;
      doc.head.appendChild(style);
    }

    Array.from(doc.querySelectorAll('button')).forEach(btn => {
      const text = (btn.textContent || '').trim().toUpperCase();
      if(text.includes('ВОЙТИ')){
        btn.addEventListener('click', () => setTimeout(openChat, 260), { once:false });
      }
    });

    const observer = new MutationObserver(() => {
      const auth = doc.querySelector('.auth');
      const app = doc.querySelector('.app');
      if((auth && auth.classList.contains('hidden')) || (app && app.classList.contains('active'))){
        openChat();
      }
    });
    observer.observe(doc.documentElement, { attributes:true, subtree:true, attributeFilter:['class'] });
  }

  authFrame.addEventListener('load', patchAuthFrame);
  chatFrame.addEventListener('load', patchChatFrame);
  setTimeout(patchAuthFrame, 500);
  setTimeout(patchChatFrame, 500);
})();
</script>
</body>
</html>
