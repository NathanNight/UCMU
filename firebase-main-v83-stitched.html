<!doctype html>

<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#f4f7f6;font-family:Arial,Helvetica,sans-serif}.ucmu-frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;background:#000}#chatFrame{opacity:0;pointer-events:none;transition:opacity .42s ease}#authFrame{opacity:1;pointer-events:auto;transition:opacity .42s ease,filter .42s ease,transform .42s ease}body.chat-open #chatFrame{opacity:1;pointer-events:auto}body.chat-open #authFrame{opacity:0;pointer-events:none;filter:blur(10px);transform:scale(1.012)}
</style>
</head>
<body>
<iframe id="authFrame" class="ucmu-frame" src="firebase-main-v63.html"></iframe>
<iframe id="chatFrame" class="ucmu-frame" src="firebase-main-v42.html"></iframe>
<script>
(()=>{
const authFrame=document.getElementById('authFrame'),chatFrame=document.getElementById('chatFrame');let opened=false;
function safeDoc(f){try{return f.contentDocument||f.contentWindow.document}catch(e){return null}}function openChat(){if(opened)return;opened=true;document.body.classList.add('chat-open');unlockChatFrame()}
function unlockChatFrame(){const d=safeDoc(chatFrame);if(!d)return;if(!d.getElementById('ucmuStitchPatch')){const s=d.createElement('style');s.id='ucmuStitchPatch';s.textContent='.login{display:none!important;opacity:0!important;pointer-events:none!important}body{overflow:hidden!important}';d.head.appendChild(s)}d.getElementById('login')?.classList.add('off');patchChatFrame()}
function patchChatFrame(){const d=safeDoc(chatFrame);if(!d||d.__ucmuV83Patched)return;d.__ucmuV83Patched=true;const w=chatFrame.contentWindow;
const s=d.createElement('style');s.id='ucmuV83Patch';s.textContent=`
.feed{scroll-behavior:smooth!important;overflow-anchor:none!important}
#chatList.ucmu-stable .chat,#folders.ucmu-stable .chat,#folders.ucmu-stable [class*="folder"],#chatList.ucmu-stable [class*="chat"]{animation:none!important}
#chatList .chat,#folders .chat,#folders [class*="folder"],#chatList [class*="chat"]{transition:transform .22s ease,top .22s ease,margin .22s ease,background .18s ease,border-color .18s ease,opacity .18s ease!important}
.msg.added,.msg.ucmu-new-glow{animation:ucmuV83MsgIn .42s cubic-bezier(.18,1.1,.28,1) both,ucmuV83SmallGlow 1.55s ease-out both!important}.msg.added .bubble,.msg.ucmu-new-glow .bubble{animation:ucmuV83BubbleGlow 1.55s ease-out both!important}
@keyframes ucmuV83MsgIn{0%{opacity:0;filter:blur(9px);transform:translateY(10px) scale(.985)}70%{opacity:1;filter:blur(0);transform:translateY(-1px) scale(1.002)}100%{opacity:1;filter:blur(0);transform:none}}
@keyframes ucmuV83SmallGlow{0%{filter:drop-shadow(0 0 7px rgba(255,255,255,.34))}100%{filter:drop-shadow(0 0 0 rgba(255,255,255,0))}}
@keyframes ucmuV83BubbleGlow{0%{box-shadow:0 0 0 1px rgba(255,255,255,.22),0 0 10px rgba(255,255,255,.16),0 10px 24px rgba(0,0,0,.18)}100%{box-shadow:0 0 0 1px rgba(255,255,255,0),0 0 0 rgba(255,255,255,0),0 10px 24px rgba(0,0,0,.18)}}
.msg.ucmu-delete-pending,.chat.ucmu-delete-pending,#folders .ucmu-delete-pending{opacity:.34!important;filter:grayscale(.1);transition:opacity .2s ease,filter .2s ease!important;pointer-events:none!important}
.msg.ucmu-delete-final,.chat.ucmu-delete-final,#folders .ucmu-delete-final{pointer-events:none!important;overflow:hidden!important;animation:ucmuV83Delete .46s cubic-bezier(.22,.9,.24,1) forwards!important;transform-origin:center!important}
@keyframes ucmuV83Delete{0%{opacity:.34;filter:blur(0);transform:translateY(0) translateX(0) scale(1);max-height:160px}45%{opacity:.72;filter:blur(1.5px);transform:translateY(-2px) translateX(12px) scale(.985);max-height:160px}100%{opacity:0;filter:blur(8px);transform:translateY(-7px) translateX(38px) scale(.94);max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0}}
.ucmuUndoToast{position:fixed;left:50%;bottom:18px;z-index:99999;transform:translateX(-50%);min-width:260px;max-width:calc(100vw - 28px);background:rgba(12,16,16,.96);border:1px solid rgba(255,255,255,.14);box-shadow:0 18px 45px rgba(0,0,0,.5),0 0 18px rgba(255,255,255,.06);padding:12px 14px 10px;color:#f4f7f6;font:13px Segoe UI,Arial,sans-serif;backdrop-filter:blur(16px)}.ucmuUndoRow{display:flex;align-items:center;gap:14px;justify-content:space-between}.ucmuUndoText{color:rgba(244,247,246,.86)}.ucmuUndoBtn{height:30px;padding:0 12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;font-weight:900;cursor:pointer}.ucmuUndoBar{height:2px;background:rgba(255,255,255,.12);margin-top:10px;overflow:hidden}.ucmuUndoBar:before{content:"";display:block;height:100%;background:rgba(255,255,255,.62);animation:ucmuUndoBar 5s linear forwards}@keyframes ucmuUndoBar{from{width:100%}to{width:0}}
#folders [class*="arrow"],#folders [class*="Arrow"],#folders [class*="chevron"],#folders [class*="Chevron"],#folders .caret,#folders .toggle,#folders summary::marker{display:none!important;opacity:0!important;width:0!important;margin:0!important}#folders summary{list-style:none!important}#folders summary::-webkit-details-marker{display:none!important}
body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="content"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="Content"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="body"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="Body"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="list"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="List"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="chats"],body.ucmu-folder-dragging #folders [data-ucmu-was-open="0"] [class*="Chats"]{display:none!important;max-height:0!important;opacity:0!important;pointer-events:none!important}
`;d.head.appendChild(s);
w.setTimeout(()=>{d.getElementById('chatList')?.classList.add('ucmu-stable');d.getElementById('folders')?.classList.add('ucmu-stable')},900);
patchSafeSending(d,w);patchGlow(d,w);patchUndoDelete(d,w);patchFolderNoOpen(d,w);patchChatEdges(d,w);patchScroll(d,w)}
function activeChatKey(d){const a=d.querySelector('.chat.active,[data-chat].active,.folderChat.active,.folder-chat.active');const raw=a?.dataset?.chat||a?.dataset?.id||a?.textContent||'default-chat';return String(raw).trim().replace(/\s+/g,' ').slice(0,80)||'default-chat'}
function patchSafeSending(d,w){const input=d.getElementById('input')||d.querySelector('.msginput,textarea,.compose input'),send=d.getElementById('send')||d.querySelector('.send'),feed=d.getElementById('feed');if(!input||!send||!feed)return;let lock=false;function scroll(){const last=feed.querySelector('.msg:last-of-type');last?.scrollIntoView?last.scrollIntoView({behavior:'smooth',block:'end',inline:'nearest'}):feed.scrollTo({top:feed.scrollHeight,behavior:'smooth'})}function safeSend(ev){if(ev){ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation()}if(lock)return;const text=(input.value||'').trim();if(!text)return;lock=true;activeChatKey(d);const stamp=Date.now().toString(36);feed.insertAdjacentHTML('beforeend',`<article class="msg added ucmu-new-glow" data-ucmu-safe-msg="${stamp}"><div class="ava s"></div><div class="bubble"><div class="meta"><span class="red">Director</span><span class="time">сейчас</span></div><div class="txt"></div></div></article>`);const msg=feed.querySelector(`[data-ucmu-safe-msg="${stamp}"] .txt`);if(msg)msg.textContent=text;input.value='';input.dispatchEvent(new w.Event('input',{bubbles:true}));scroll();w.setTimeout(()=>lock=false,90)}send.addEventListener('click',safeSend,true);input.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&!ev.shiftKey)safeSend(ev)},true)}
function patchGlow(d,w){const feed=d.getElementById('feed');if(!feed)return;new w.MutationObserver(muts=>{muts.forEach(m=>Array.from(m.addedNodes).forEach(n=>{if(n.nodeType!==1)return;const items=n.classList?.contains('msg')?[n]:Array.from(n.querySelectorAll?.('.msg')||[]);items.forEach(el=>{el.classList.add('ucmu-new-glow');w.setTimeout(()=>el.classList.remove('ucmu-new-glow'),1650)})}))}).observe(feed,{childList:true,subtree:false})}
function patchScroll(d,w){const feed=d.getElementById('feed');if(!feed)return;let t=0;new w.MutationObserver(muts=>{if(!muts.some(m=>Array.from(m.addedNodes).some(n=>n.nodeType===1&&(n.classList?.contains('msg')||n.querySelector?.('.msg')))))return;w.clearTimeout(t);t=w.setTimeout(()=>{const last=feed.querySelector('.msg:last-of-type');last?.scrollIntoView?last.scrollIntoView({behavior:'smooth',block:'end',inline:'nearest'}):feed.scrollTo({top:feed.scrollHeight,behavior:'smooth'})},32)}).observe(feed,{childList:true,subtree:false})}
function patchUndoDelete(d,w){let lastMsg=null,lastChat=null,lastFolder=null,toast=null,timer=null;function remember(ev){const msg=ev.target.closest?.('.msg');if(msg)lastMsg=msg;const chat=ev.target.closest?.('.chat');if(chat)lastChat=chat;const f=closestFolder(ev.target);if(f)lastFolder=f}d.addEventListener('contextmenu',remember,true);d.addEventListener('pointerdown',remember,true);
function showUndo(target,text,after){if(!target)return;clearTimeout(timer);toast?.remove();target.classList.add('ucmu-delete-pending');toast=d.createElement('div');toast.className='ucmuUndoToast';toast.innerHTML=`<div class="ucmuUndoRow"><div class="ucmuUndoText">${text}</div><button class="ucmuUndoBtn">ВЕРНУТЬ</button></div><div class="ucmuUndoBar"></div>`;d.body.appendChild(toast);toast.querySelector('button').onclick=()=>{clearTimeout(timer);target.classList.remove('ucmu-delete-pending');toast.remove();toast=null};timer=w.setTimeout(()=>{toast?.remove();toast=null;target.classList.remove('ucmu-delete-pending');target.classList.add('ucmu-delete-final');w.setTimeout(()=>{after?after(target):target.remove()},470)},5000)}
function hideMenus(){['ctx','chatCtx','folderCtx','deleteModal','selectedCtx'].forEach(id=>d.getElementById(id)?.classList.add('hidden'))}
d.addEventListener('click',ev=>{const confirm=ev.target.closest?.('#confirmDelete');if(confirm){const modal=d.getElementById('deleteModal');if(!modal||modal.classList.contains('hidden')||!lastMsg)return;ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();const all=d.getElementById('deleteForAll')?.checked;if(all){hideMenus();lastMsg.classList.add('ucmu-delete-final');w.setTimeout(()=>lastMsg?.remove(),470)}else{hideMenus();showUndo(lastMsg,'Сообщение удалено для вас',el=>el.remove())}return}
const chatDel=ev.target.closest?.('.chatAction.danger');if(chatDel){ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();const t=lastChat||d.querySelector('.chat:hover')||d.querySelector('.chat.active');hideMenus();showUndo(t,'Чат удалён',el=>el.remove());return}
const folderDel=ev.target.closest?.('.folderAction.danger');if(folderDel){ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();const t=lastFolder||closestFolder(folderDel)||d.querySelector('#folders [data-folder-id],#folders .folderItem,#folders .folder-item,#folders .folder');hideMenus();showUndo(t,'Папка удалена',el=>el.remove());return}},true)
function closestFolder(el){if(!el?.closest)return null;const root=d.getElementById('folders');const f=el.closest('[data-folder-id],.folderItem,.folder-item,.folderRow,.folder-row,.folderCard,.folder-card,.folder,details');return f&&root?.contains(f)&&f.id!=='folderBtn'&&!f.closest('#folderModal,#folderStyleModal,#folderCtx')?f:null}}
function patchFolderNoOpen(d,w){const root=d.getElementById('folders');if(!root)return;const sel='[data-folder-id],.folderItem,.folder-item,.folderRow,.folder-row,.folderCard,.folder-card,.folder,details';let dragging=false;function folders(){return Array.from(root.querySelectorAll(sel)).filter(f=>f.id!=='folderBtn'&&!f.closest('#folderModal,#folderStyleModal,#folderCtx'))}function isChat(el){return!!el?.closest?.('.chat,[data-chat],.folderChat,.folder-chat')}function isOpen(f){if(!f)return false;if(f.open===true)return true;if(f.getAttribute('aria-expanded')==='true')return true;if(f.dataset?.open==='true'||f.dataset?.expanded==='true')return true;if(/\b(open|opened|expanded|is-open|folderOpen|folder-open|show|shown)\b/i.test(String(f.className||'')))return true;const c=f.querySelector('[class*="content"],[class*="Content"],[class*="body"],[class*="Body"],[class*="list"],[class*="List"],[class*="chats"],[class*="Chats"]');return!!(c&&!c.classList.contains('hidden')&&c.offsetHeight>6)}function snap(){folders().forEach(f=>{f.dataset.ucmuWasOpen=isOpen(f)?'1':'0';f.dataset.ucmuClassBefore=String(f.className||'');f.dataset.ucmuAriaBefore=f.getAttribute('aria-expanded')||'';if(f.open!==undefined)f.dataset.ucmuOpenBefore=f.open?'1':'0'})}function closeBack(){folders().forEach(f=>{if(f.dataset.ucmuWasOpen!=='0')return;f.className=f.dataset.ucmuClassBefore||f.className;f.setAttribute('aria-expanded','false');if(f.open!==undefined)f.open=false;Array.from(f.querySelectorAll('[class*="content"],[class*="Content"],[class*="body"],[class*="Body"],[class*="list"],[class*="List"],[class*="chats"],[class*="Chats"]')).forEach(c=>{c.classList.add('hidden');c.style.display='none';c.style.maxHeight='0px';c.style.opacity='0'});const n=f.nextElementSibling;if(n&&root.contains(n)&&/folder|chat|list|body|content/i.test(n.className||'')){n.classList.add('hidden');n.style.display='none';n.style.maxHeight='0px';n.style.opacity='0'}})}function start(ev){if(!isChat(ev.target))return;dragging=true;d.body.classList.add('ucmu-folder-dragging');snap();closeBack()}function move(ev){if(!dragging)return;closeBack();const f=ev.target.closest?.(sel);if(f&&root.contains(f)&&f.dataset.ucmuWasOpen==='0'){ev.stopImmediatePropagation();ev.preventDefault()}}function end(){if(!dragging)return;dragging=false;d.body.classList.remove('ucmu-folder-dragging');folders().forEach(f=>delete f.dataset.ucmuWasOpen)}d.addEventListener('dragstart',start,true);d.addEventListener('dragenter',move,true);d.addEventListener('dragover',move,true);d.addEventListener('drop',()=>w.setTimeout(end,80),true);d.addEventListener('dragend',end,true);new w.MutationObserver(()=>{if(dragging)closeBack()}).observe(root,{attributes:true,subtree:true,childList:true,attributeFilter:['class','style','open','aria-expanded']})}
function patchChatEdges(d,w){function arm(){d.querySelectorAll('.chat').forEach(c=>{c.setAttribute('draggable','true')})}arm();new w.MutationObserver(arm).observe(d.getElementById('chatList')||d.body,{childList:true,subtree:true});d.addEventListener('contextmenu',ev=>{const chat=ev.target.closest?.('.chat');if(!chat)return;const ctx=d.getElementById('chatCtx');if(!ctx)return;ctx.classList.remove('hidden');ctx.style.left=Math.min(ev.clientX,d.documentElement.clientWidth-270)+'px';ctx.style.top=Math.min(ev.clientY,d.documentElement.clientHeight-190)+'px'},true)}
function patchAuthFrame(){const d=safeDoc(authFrame);if(!d)return;if(!d.getElementById('ucmuAuthOnlyPatch')){const s=d.createElement('style');s.id='ucmuAuthOnlyPatch';s.textContent='.app,.modal{display:none!important;opacity:0!important;pointer-events:none!important}.auth{display:grid!important}html,body{overflow:hidden!important;background:#000!important}';d.head.appendChild(s)}Array.from(d.querySelectorAll('button')).forEach(b=>{if((b.textContent||'').trim().toUpperCase().includes('ВОЙТИ'))b.addEventListener('click',()=>setTimeout(openChat,260),{once:false})});new MutationObserver(()=>{const a=d.querySelector('.auth'),app=d.querySelector('.app');if((a&&a.classList.contains('hidden'))||(app&&app.classList.contains('active')))openChat()}).observe(d.documentElement,{attributes:true,subtree:true,attributeFilter:['class']})}
authFrame.addEventListener('load',patchAuthFrame);chatFrame.addEventListener('load',unlockChatFrame);setTimeout(patchAuthFrame,500);setTimeout(unlockChatFrame,500)
})();
</script>
